l_english:
 tech_exw_thanix_cannon:0 "Thanix Cannon"
 tech_exw_thanix_cannon_desc:0 "Combining magnetic acceleration with superheated metallic ammunition produces a compact artillery system with exceptional armor penetration."
 EXW_THANIX_CANNON:0 "Thanix Cannon"
 EXW_THANIX_CANNON_DESC:0 "A liquid-metal accelerator that strikes like kinetic artillery and burns through armor like plasma."
 tech_exw_mac_accelerator:0 "MAC Accelerator"
 tech_exw_mac_accelerator_desc:0 "Capital-scale magnetic accelerator architecture permits spinal weapons to launch enormous slugs at relativistic velocities."
 EXW_MAC_ACCELERATOR:0 "MAC Accelerator"
 EXW_MAC_ACCELERATOR_DESC:0 "A slow-firing spinal mass accelerator built for devastating opening salvos."
 tech_exw_asgard_beam:0 "Asgard Plasma Beam"
 tech_exw_asgard_beam_desc:0 "Advanced field geometry can sustain a coherent plasma beam across interplanetary combat distances."
 EXW_ASGARD_BEAM:0 "Asgard Plasma Beam"
 EXW_ASGARD_BEAM_DESC:0 "A penetrating spinal beam that divides its energy between shields, armor, and hull."
 tech_exw_phaser_array:0 "Phaser Array"
 tech_exw_phaser_array_desc:0 "Segmented emitter strips provide accurate, continuously retargetable directed-energy fire."
 EXW_PHASER_ARRAY:0 "Phaser Array"
 EXW_PHASER_ARRAY_DESC:0 "A precise, versatile beam array with excellent tracking and dependable damage against every defense."
 tech_exw_wave_motion_gun:0 "Wave-Motion Gun"
 tech_exw_wave_motion_gun_desc:0 "A zero-point reactor can be discharged through a spinal compression chamber as a single catastrophic wave front."
 EXW_WAVE_MOTION_GUN:0 "Wave-Motion Gun"
 EXW_WAVE_MOTION_GUN_DESC:0 "An immense spinal cannon with extraordinary damage, range, power demand, and recharge time."
 tech_exw_cyclonic_torpedo:0 "Cyclonic Torpedo"
 tech_exw_cyclonic_torpedo_desc:0 "Antimatter compression makes it possible to place strategic-scale destructive force inside a ship-launched torpedo."
 EXW_CYCLONIC_TORPEDO:0 "Cyclonic Torpedo"
 EXW_CYCLONIC_TORPEDO_DESC:0 "A heavily armored torpedo designed to annihilate large targets after passing through their shields."
 tech_exw_necron_gauss:0 "Gauss Flayer"
 tech_exw_necron_gauss_desc:0 "Coupled gauss and disruption fields can strip matter from a target layer by layer."
 EXW_NECRON_GAUSS:0 "Gauss Flayer"
 EXW_NECRON_GAUSS_DESC:0 "A green-hued disassembly beam that partially bypasses both shields and armor."
 tech_exw_gridfire:0 "Gridfire Projector"
 tech_exw_gridfire_desc:0 "Mega-engineering principles allow an emitter to impose destructive energy geometry directly upon local space."
 EXW_GRIDFIRE:0 "Gridfire Projector"
 EXW_GRIDFIRE_DESC:0 "A titan-mounted projector that attacks the space occupied by its target, ignoring conventional defenses."
 tech_exw_molecular_disruptor:0 "Molecular Disruptor"
 tech_exw_molecular_disruptor_desc:0 "Refined disruption fields can sever molecular bonds without first defeating external defenses."
 EXW_MOLECULAR_DISRUPTOR:0 "Molecular Disruptor"
 EXW_MOLECULAR_DISRUPTOR_DESC:0 "A medium weapon that bypasses shields and armor to attack hull integrity directly."
 tech_exw_superlaser:0 "Superlaser Focusing Array"
 tech_exw_superlaser_desc:0 "A vast crystal matrix can combine many high-energy beams into one planet-scorching ray."
 EXW_SUPERLASER:0 "Superlaser Focusing Array"
 EXW_SUPERLASER_DESC:0 "A titan-scale beam with immense damage and a long charge cycle."
 tech_exw_pdc_network:0 "PDC Network"
 tech_exw_pdc_network_desc:0 "Distributed fire-control software turns dozens of small kinetic cannons into a unified defensive screen."
 EXW_PDC_NETWORK:0 "PDC Network"
 EXW_PDC_NETWORK_DESC:0 "A rapid point-defense cannon network effective against missiles and strike craft."
 tech_exw_epstein_torpedo:0 "Epstein-Drive Torpedo"
 tech_exw_epstein_torpedo_desc:0 "Highly efficient propulsion produces torpedoes with extreme range, speed, and terminal maneuverability."
 EXW_EPSTEIN_TORPEDO:0 "Epstein-Drive Torpedo"
 EXW_EPSTEIN_TORPEDO_DESC:0 "A fast, evasive, long-range torpedo optimized for pursuit and shield penetration."
 tech_exw_molecular_device:0 "Molecular Detachment Device"
 tech_exw_molecular_device_desc:0 "A guided warhead can trigger a self-propagating collapse among nearby molecular structures."
 EXW_MOLECULAR_DEVICE:0 "Molecular Detachment Device"
 EXW_MOLECULAR_DEVICE_DESC:0 "A defense-bypassing torpedo whose destructive field is particularly lethal to exposed hulls."
 tech_exw_bolo_hellbore:0 "Bolo Hellbore"
 tech_exw_bolo_hellbore_desc:0 "Heavy plasma containment permits a compact cannon to fire star-hot bolts through the strongest armor."
 EXW_BOLO_HELLBORE:0 "Bolo Hellbore"
 EXW_BOLO_HELLBORE_DESC:0 "A large plasma weapon specialized for burning through armor at artillery range."
 tech_exw_langston_field:0 "Langston Field Projector"
 tech_exw_langston_field_desc:0 "A layered energy field can absorb incoming radiation and momentum before distributing it through the ship's defenses."
 EXW_LANGSTON_FIELD:0 "Langston Field Projector"
 EXW_LANGSTON_FIELD_DESC:0 "An auxiliary defensive field that greatly increases shields and modestly reinforces armor."
 tech_exw_sonic_disruptor:0 "Sonic Disruption Array"
 tech_exw_sonic_disruptor_desc:0 "Adaptive resonance and predictive control allow directed oscillations to pass through external defenses."
 EXW_SONIC_DISRUPTOR:0 "Sonic Disruption Array"
 EXW_SONIC_DISRUPTOR_DESC:0 "A rapid, accurate resonance weapon with partial shield and armor penetration."
 tech_exw_dalek_ray:0 "Extermination Ray"
 tech_exw_dalek_ray_desc:0 "Synthetic targeting logic and gamma-frequency emitters create a beam optimized for complete target destruction."
 EXW_DALEK_RAY:0 "Dalek Extermination Ray"
 EXW_DALEK_RAY_DESC:0 "A merciless energy weapon that inflicts exceptional damage on armor and hull."
 tech_exw_bifrost_lance:0 "Bifrost Lance"
 tech_exw_bifrost_lance_desc:0 "Hyperspace geometry can fold a particle lance across the intervening distance and inside a target's shield envelope."
 EXW_BIFROST_LANCE:0 "Bifrost Lance"
 EXW_BIFROST_LANCE_DESC:0 "A brilliant long-range spinal lance with substantial shield penetration."
 tech_exw_emerald_construct:0 "Emerald Construct Cannon"
 tech_exw_emerald_construct_desc:0 "Psionic intention can be stabilized as a coherent emerald structure and projected as a weapon."
 EXW_EMERALD_CONSTRUCT:0 "Emerald Construct Cannon"
 EXW_EMERALD_CONSTRUCT_DESC:0 "A precise psionic cannon whose disciplined energy constructs perform well against all defenses."
 tech_exw_omega_beam:0 "Omega Beam"
 tech_exw_omega_beam_desc:0 "Perfect sensor prediction permits a coherent beam to correct its path as its target attempts to evade."
 EXW_OMEGA_BEAM:0 "Omega Beam"
 EXW_OMEGA_BEAM_DESC:0 "A long-range beam with perfect accuracy and tracking against even the most evasive target."
 tech_exw_stormbringer:0 "Stormbringer Soul Blade"
 tech_exw_stormbringer_desc:0 "A hostile psionic resonance can be bound into a close-range projector and fed upon the destruction it causes."
 EXW_STORMBRINGER:0 "Stormbringer Soul Blade"
 EXW_STORMBRINGER_DESC:0 "A cursed close-range weapon that tears through shields and exposed hulls."
 tech_exw_shardblade:0 "Shardblade Projector"
 tech_exw_shardblade_desc:0 "Psionic matter can briefly manifest as an impossibly sharp blade beside an enemy vessel."
 EXW_SHARDBLADE:0 "Shardblade Projector"
 EXW_SHARDBLADE_DESC:0 "A short-range projected blade that largely ignores shields and armor."
 tech_exw_dragonfire:0 "Dragonfire Cannon"
 tech_exw_dragonfire_desc:0 "Biological heat regulation and plasma containment combine into an artificial imitation of draconic flame."
 EXW_DRAGONFIRE:0 "Dragonfire Cannon"
 EXW_DRAGONFIRE_DESC:0 "A short-ranged torrent of plasma that devastates armor and hull."
 tech_exw_black_arrow:0 "Black Arrow Missile"
 tech_exw_black_arrow_desc:0 "Dense penetrators and advanced guidance create a singular missile intended to slay targets far larger than itself."
 EXW_BLACK_ARROW:0 "Black Arrow Missile"
 EXW_BLACK_ARROW_DESC:0 "A highly accurate anti-capital torpedo with exceptional armor damage."
 tech_exw_gungnir:0 "Gungnir Spear Launcher"
 tech_exw_gungnir_desc:0 "Tachyon prediction and advanced kinetic artillery produce a projectile whose firing solution never misses."
 EXW_GUNGNIR:0 "Gungnir Spear Launcher"
 EXW_GUNGNIR_DESC:0 "An exceptionally accurate long-range kinetic spear with strong shield damage."
 tech_exw_excalibur:0 "Excalibur Psionic Blade"
 tech_exw_excalibur_desc:0 "Psionic focusing and strike-craft control theory allow a radiant blade to be projected at close range."
 EXW_EXCALIBUR:0 "Excalibur Psionic Blade"
 EXW_EXCALIBUR_DESC:0 "A precise close-range blade of psionic light that penetrates conventional defenses."
 tech_exw_mjolnir:0 "Mjolnir Arc Projector"
 tech_exw_mjolnir_desc:0 "A compact arc emitter can hurl wildly variable but defense-bypassing electrical discharges."
 EXW_MJOLNIR:0 "Mjolnir Arc Projector"
 EXW_MJOLNIR_DESC:0 "A lightning projector with perfect accuracy, unpredictable damage, and complete defense penetration."
 tech_exw_medusa_gaze:0 "Medusa Gaze Array"
 tech_exw_medusa_gaze_desc:0 "Predictive sensors can hold a disruptive field upon a moving target until its structure appears to turn to stone."
 EXW_MEDUSA_GAZE:0 "Medusa Gaze Array"
 EXW_MEDUSA_GAZE_DESC:0 "An accurate tracking beam that ignores shields and partially bypasses armor."

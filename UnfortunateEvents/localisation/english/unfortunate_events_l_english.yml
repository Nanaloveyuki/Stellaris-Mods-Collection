l_english:
 ue.option: "Well. That's unfortunate."
 ue.100.title: "Reactor Synchronization Failure"
 ue.100.desc: "The main fusion grid attempted to synchronize with a relay that had technically been on fire for six hours. Engineers saved the colony from darkness, but the emergency shutdown consumed a painful amount of stored energy.\n\n§R[Root.ue_resource_taken] Energy taken§!"
 ue.101.title: "Premium Darkness Subscription"
 ue.101.desc: "A billing error briefly classified several public power stations as luxury illumination services. By the time the forms stopped screaming, the empire had spent enough energy credits to make darkness look affordable.\n\n§R[Root.ue_resource_taken] Energy taken§!"
 ue.102.title: "Plasma Conduit Tango"
 ue.102.desc: "Two plasma conduits crossed paths in a maintenance tunnel and performed what survivors described as an extremely bright dance. The resulting containment purge drained a large reserve of energy.\n\n§R[Root.ue_resource_taken] Energy taken§!"
 ue.103.title: "The Sun Was Too Loud"
 ue.103.desc: "Solar collectors in one system began feeding back harmonic noise into the power network. Technicians fixed the problem by venting charge into space, which was effective, expensive, and deeply embarrassing.\n\n§R[Root.ue_resource_taken] Energy taken§!"
 ue.104.title: "Emergency Battery Bonfire"
 ue.104.desc: "A reserve battery stack overheated after a coolant valve was installed backwards. The official report calls it a thermal event; everyone else is calling it a very costly bonfire.\n\n§R[Root.ue_resource_taken] Energy taken§!"
 ue.105.title: "Grid Cascade Incident"
 ue.105.desc: "A minor relay hiccup became a major grid cascade after seventeen automated systems agreed to panic at once. Stability was restored, but the energy reserves took the hit.\n\n§R[Root.ue_resource_taken] Energy taken§!"
 ue.106.title: "Antimatter Coupon Misprint"
 ue.106.desc: "A procurement clerk accidentally approved antimatter fuel at a promotional rate that did not exist. The correction process consumed enough energy credits to power a small moon and several legal departments.\n\n§R[Root.ue_resource_taken] Energy taken§!"
 ue.107.title: "Orbital Fuse Pop"
 ue.107.desc: "An orbital transfer station suffered a fuse failure large enough to be seen from the night side of the planet. Repairs were swift, but replacing the lost power reserves was not cheap.\n\n§R[Root.ue_resource_taken] Energy taken§!"
 ue.108.title: "Unauthorized Aurora"
 ue.108.desc: "A weather-control array dumped excess charge into the upper atmosphere, creating a beautiful artificial aurora. It was romantic, inspiring, and economically irritating.\n\n§R[Root.ue_resource_taken] Energy taken§!"
 ue.109.title: "The Reactor Sneezed"
 ue.109.desc: "A containment fluctuation forced a reactor to eject superheated plasma into a sacrificial sink. Nobody was injured, but the energy loss was large enough that accountants requested hazard pay.\n\n§R[Root.ue_resource_taken] Energy taken§!"
 ue.110.title: "Overenthusiastic Power Saving"
 ue.110.desc: "An automated conservation system decided the best way to save energy was to shut down payment verification, emergency lighting, and itself. Restarting everything consumed more energy than it saved.\n\n§R[Root.ue_resource_taken] Energy taken§!"
 ue.111.title: "Hypergrid Brownout"
 ue.111.desc: "Long-distance grid traffic hit a routing loop and stranded stored power in the wrong sector. The reserves were recovered eventually, after most of their value had already been spent stabilizing the loop.\n\n§R[Root.ue_resource_taken] Energy taken§!"
 ue.112.title: "Lightning Farm Stampede"
 ue.112.desc: "A planetary storm-harvesting array overloaded when several storm fronts arrived early and apparently in formation. Emergency grounding bled the stored charge into the crust.\n\n§R[Root.ue_resource_taken] Energy taken§!"
 ue.113.title: "Thermal Regulator Meltdown"
 ue.113.desc: "A regulator built to prevent overheating overheated with remarkable confidence. The containment team saved the facility, but the energy reserve is now mostly a cautionary diagram.\n\n§R[Root.ue_resource_taken] Energy taken§!"
 ue.114.title: "Dimmer Switch Apocalypse"
 ue.114.desc: "A habitat-wide dimming system interpreted a maintenance request as a command to pulse every light at maximum output. The population is awake, angry, and the energy budget is smoking.\n\n§R[Root.ue_resource_taken] Energy taken§!"
 ue.115.title: "Magnetic Bottle Crack"
 ue.115.desc: "A magnetic containment bottle cracked under stress during routine fuel cycling. The fuel did not escape, exactly, but the stored energy certainly did.\n\n§R[Root.ue_resource_taken] Energy taken§!"
 ue.116.title: "Substation With Opinions"
 ue.116.desc: "A semi-autonomous substation refused three shutdown commands and then attempted to optimize the grid by eating reserve power. It has been demoted to manual operation and glared at by engineers.\n\n§R[Root.ue_resource_taken] Energy taken§!"
 ue.117.title: "The Great Outlet Hunt"
 ue.117.desc: "A fleet depot drew emergency power from civilian reserves after someone mislabelled a maintenance socket as strategic infrastructure. The outlet has been found. The energy credits have not.\n\n§R[Root.ue_resource_taken] Energy taken§!"
 ue.118.title: "Solar Mirror Misalignment"
 ue.118.desc: "A solar mirror array focused light onto its own control tower, which was not part of the efficiency plan. Repairs required dumping accumulated energy before the mirrors could be safely reset.\n\n§R[Root.ue_resource_taken] Energy taken§!"
 ue.119.title: "Containment Lattice Faceplant"
 ue.119.desc: "A containment lattice failed during a stress test and triggered every backup drain in sequence. The good news is that nothing exploded. The bad news is printed on the energy ledger.\n\n§R[Root.ue_resource_taken] Energy taken§!"
 ue.120.title: "Deep-Core Tunnel Collapse"
 ue.120.desc: "A deep-core mining tunnel folded in on itself after a stubborn fault line chose violence. The miners escaped through emergency shafts, but the extracted minerals did not.\n\n§R[Root.ue_resource_taken] Minerals taken§!"
 ue.121.title: "Rockslide With Ambition"
 ue.121.desc: "A routine quarry blast awakened a hillside that had apparently been waiting for its moment. Recovery crews retrieved the equipment, though most of the mineral stockpile is now decorative gravel.\n\n§R[Root.ue_resource_taken] Minerals taken§!"
 ue.122.title: "The Ore Ate the Drill"
 ue.122.desc: "A newly discovered ore seam reacted badly to industrial drilling and swallowed three drill heads whole. The remaining minerals were written off before the drill could develop a taste for accountants.\n\n§R[Root.ue_resource_taken] Minerals taken§!"
 ue.123.title: "Conveyor Belt Rebellion"
 ue.123.desc: "A mineral conveyor system jammed, reversed, and distributed raw ore across six storage yards with artistic commitment. Sorting the mess cost more minerals than anyone wants to admit.\n\n§R[Root.ue_resource_taken] Minerals taken§!"
 ue.124.title: "Seismic Surprise Party"
 ue.124.desc: "Automated sensors failed to warn a mining platform about a local quake because the quake was technically under the reporting threshold. The collapsed storage bay disagrees.\n\n§R[Root.ue_resource_taken] Minerals taken§!"
 ue.125.title: "Dust Storm Accounting"
 ue.125.desc: "A planetary dust storm breached a surface refinery and turned a month of processed minerals into airborne regret. The filters are clogged, the crews are coughing, and the stockpile is gone.\n\n§R[Root.ue_resource_taken] Minerals taken§!"
 ue.126.title: "Grav-Crane Drop"
 ue.126.desc: "A grav-crane lost calibration while lifting a mineral container array. The container survived; the floor, neighboring containers, and budget did not.\n\n§R[Root.ue_resource_taken] Minerals taken§!"
 ue.127.title: "Subterranean Shortcut"
 ue.127.desc: "A maintenance crew opened what they believed was a service tunnel and discovered an uncharted sinkhole. Several mineral pallets took the shortcut first.\n\n§R[Root.ue_resource_taken] Minerals taken§!"
 ue.128.title: "Refinery Grinder Incident"
 ue.128.desc: "A refinery grinder was fed the wrong density of ore and responded by eating its own feed system. The shutdown preserved the plant, but not the minerals inside it.\n\n§R[Root.ue_resource_taken] Minerals taken§!"
 ue.129.title: "The Mountain Blinked"
 ue.129.desc: "Surveyors insist the mountain shifted by several meters overnight. Regardless of whether mountains can blink, the mineral depot at its base is now very flat.\n\n§R[Root.ue_resource_taken] Minerals taken§!"
 ue.130.title: "Ore Silo Pancake"
 ue.130.desc: "A pressure seal failed in a vertical ore silo, collapsing the contents into one enormous mineral pancake. It is impressive, useless, and already annoying logistics officers.\n\n§R[Root.ue_resource_taken] Minerals taken§!"
 ue.131.title: "Tunnel Map Optimism"
 ue.131.desc: "A mine expansion followed a map that was accurate, but unfortunately accurate for last century. The minerals lost in the collapse have been reclassified as historical material.\n\n§R[Root.ue_resource_taken] Minerals taken§!"
 ue.132.title: "Excavator Emotional Damage"
 ue.132.desc: "An autonomous excavator misread a hazard marker as a productivity challenge. Its final act was to turn a valuable mineral cache into a crater-shaped lesson.\n\n§R[Root.ue_resource_taken] Minerals taken§!"
 ue.133.title: "Magnetic Separator Tantrum"
 ue.133.desc: "A magnetic separator overloaded and launched processed ore into the ceiling like metallic hail. The cleanup crews have requested helmets and a smaller budget hole.\n\n§R[Root.ue_resource_taken] Minerals taken§!"
 ue.134.title: "The Floor Had Other Plans"
 ue.134.desc: "A storage warehouse floor rated for heavy minerals discovered a new definition of heavy. The lower level now contains the minerals, the floor, and several apologies.\n\n§R[Root.ue_resource_taken] Minerals taken§!"
 ue.135.title: "Lava Pocket Breach"
 ue.135.desc: "A mining charge opened a hidden lava pocket beneath a mineral vein. The resulting evacuation was successful; the resulting smelting was uncontrolled and financially tragic.\n\n§R[Root.ue_resource_taken] Minerals taken§!"
 ue.136.title: "Survey Drone Avalanche"
 ue.136.desc: "A survey drone bumped a shelf of unstable crystal-bearing rock. The official cause is geological instability, though the drone has been banned from making eye contact with mountains.\n\n§R[Root.ue_resource_taken] Minerals taken§!"
 ue.137.title: "Processing Mill Choke"
 ue.137.desc: "A processing mill accepted too much ore at once and entered a shutdown state best described as choking. Clearing the machinery required sacrificing a large mineral batch.\n\n§R[Root.ue_resource_taken] Minerals taken§!"
 ue.138.title: "Warehouse Gravity Oops"
 ue.138.desc: "A local gravity stabilizer blinked during mineral stacking operations. For three seconds, inventory became weather.\n\n§R[Root.ue_resource_taken] Minerals taken§!"
 ue.139.title: "The Very Heavy Door"
 ue.139.desc: "A blast door in a mineral vault misfired and sealed itself through several storage racks. The door is secure. The minerals are now part of the door.\n\n§R[Root.ue_resource_taken] Minerals taken§!"
 ue.140.title: "Crop Blight With Branding"
 ue.140.desc: "A fungal blight spread through agricultural domes after being mistaken for a harmless flavor-enhancing mold. The marketing team has been restrained, and the contaminated food has been destroyed.\n\n§R[Root.ue_resource_taken] Food taken§!"
 ue.141.title: "Refrigeration Vacation"
 ue.141.desc: "A planetary cold-storage network entered vacation mode after a calendar synchronization error. The food reserves are now warm, fragrant, and unavailable for consumption.\n\n§R[Root.ue_resource_taken] Food taken§!"
 ue.142.title: "Irrigation Soup Incident"
 ue.142.desc: "An irrigation control system mixed nutrient slurry at twelve times the approved density. The crops grew rapidly, fell over, and were politely incinerated.\n\n§R[Root.ue_resource_taken] Food taken§!"
 ue.143.title: "The Grain Silo Sighed"
 ue.143.desc: "A grain silo ruptured after internal pressure sensors decided the warning lights were optional. The resulting grain wave was dramatic, sticky, and completely unusable.\n\n§R[Root.ue_resource_taken] Food taken§!"
 ue.144.title: "Luxury Beetle Buffet"
 ue.144.desc: "Imported decorative beetles escaped into a hydroponic farm and discovered the empire's food reserves before the empire discovered them. They have excellent taste and terrible timing.\n\n§R[Root.ue_resource_taken] Food taken§!"
 ue.145.title: "Protein Vat Foam Party"
 ue.145.desc: "A protein vat overflowed after a culture accelerator was left running overnight. The foam reached the ceiling and the entire batch was condemned, despite several brave suggestions.\n\n§R[Root.ue_resource_taken] Food taken§!"
 ue.146.title: "Aquaponic Fish Coup"
 ue.146.desc: "Fish in a closed aquaponic system blocked filtration outlets with suspicious coordination. Whether this was rebellion or instinct, the ruined harvest is very real.\n\n§R[Root.ue_resource_taken] Food taken§!"
 ue.147.title: "Pollination Drone Mix-Up"
 ue.147.desc: "Pollination drones were given a festival route instead of an agricultural route. The parade looked lovely; the unpollinated crops look expensive.\n\n§R[Root.ue_resource_taken] Food taken§!"
 ue.148.title: "Spice Rack Catastrophe"
 ue.148.desc: "A flavoring agent used in ration production reacted with a preservative and turned several warehouses into sneeze weapons. The food was destroyed before morale followed.\n\n§R[Root.ue_resource_taken] Food taken§!"
 ue.149.title: "Compost Protocol Error"
 ue.149.desc: "A recycling system classified fresh harvest crates as compostable waste. Technically it was not wrong, but the timing has been noted in several angry reports.\n\n§R[Root.ue_resource_taken] Food taken§!"
 ue.150.title: "Hydroponic Algae Bloom"
 ue.150.desc: "A nutrient imbalance triggered a runaway algae bloom across the hydroponic beds. The result is green, enthusiastic, and not legally food.\n\n§R[Root.ue_resource_taken] Food taken§!"
 ue.151.title: "Livestock Door Malfunction"
 ue.151.desc: "An automated livestock barrier opened during feeding rotation and allowed the animals to explore the storage wing. They learned much. We lost more.\n\n§R[Root.ue_resource_taken] Food taken§!"
 ue.152.title: "Ration Printer Jam"
 ue.152.desc: "Industrial ration printers jammed mid-cycle and fused several production lines into one massive rectangular meal. It is nutritionally complete and structurally impossible to distribute.\n\n§R[Root.ue_resource_taken] Food taken§!"
 ue.153.title: "Atmospheric Pollen Disaster"
 ue.153.desc: "A terraforming support tower released concentrated pollen into agricultural sectors during harvest. The crops were contaminated, the workers sneezed, and the food reserves were burned.\n\n§R[Root.ue_resource_taken] Food taken§!"
 ue.154.title: "The Orchard Fell Up"
 ue.154.desc: "A gravity calibrator failed in an orchard dome, throwing fruit into the roof at harvest speed. The ceiling has been cleaned. The harvest has not survived.\n\n§R[Root.ue_resource_taken] Food taken§!"
 ue.155.title: "Fermentation Betrayal"
 ue.155.desc: "A preserved food batch began fermenting with unexpected enthusiasm. The smell reached orbit and the quartermaster ordered immediate disposal.\n\n§R[Root.ue_resource_taken] Food taken§!"
 ue.156.title: "Greenhouse Glass Rain"
 ue.156.desc: "A greenhouse shield grid shattered during a micro-meteor shower. The crops beneath are now seasoned with transparent shrapnel and regret.\n\n§R[Root.ue_resource_taken] Food taken§!"
 ue.157.title: "Invasive Salad"
 ue.157.desc: "An alien vine entered the food supply chain as garnish and left as a dominant agricultural force. The contaminated reserves were destroyed before the salad became policy.\n\n§R[Root.ue_resource_taken] Food taken§!"
 ue.158.title: "Cold Chain Domino"
 ue.158.desc: "A single cold-chain relay failed and dragged three neighboring warehouses into thermal instability. The food losses are being measured in both tons and sighs.\n\n§R[Root.ue_resource_taken] Food taken§!"
 ue.159.title: "The Soup Pipeline Burst"
 ue.159.desc: "A pressurized nutrient pipeline burst above a ration depot. The depot is cleaner now, somehow, but the stored food has joined the walls.\n\n§R[Root.ue_resource_taken] Food taken§!"
 ue.160.title: "Orbital Dockyard Fire"
 ue.160.desc: "A coolant leak in the orbital yards ignited during hull plating operations. The fire was contained, but several stacks of processed alloys became modern art.\n\n§R[Root.ue_resource_taken] Alloys taken§!"
 ue.161.title: "Foundry Floor Sunburn"
 ue.161.desc: "A foundry plasma torch locked open and treated the assembly floor like a small star. Production survived; the alloy reserve did not.\n\n§R[Root.ue_resource_taken] Alloys taken§!"
 ue.162.title: "Hull Plate Dominoes"
 ue.162.desc: "A gravity clamp released during storage rotation, toppling a line of cruiser-grade hull plates. The noise was historic and the alloy loss was immediate.\n\n§R[Root.ue_resource_taken] Alloys taken§!"
 ue.163.title: "Quality Control Cannon"
 ue.163.desc: "A weapons test fixture fired into an alloy warehouse after receiving coordinates from an outdated floor plan. The test was successful in the least useful way possible.\n\n§R[Root.ue_resource_taken] Alloys taken§!"
 ue.164.title: "Drydock Door Crunch"
 ue.164.desc: "A drydock blast door closed while a shipment of alloy beams was halfway through. The beams are now shorter, flatter, and very difficult to invoice.\n\n§R[Root.ue_resource_taken] Alloys taken§!"
 ue.165.title: "Smelter Overconfidence"
 ue.165.desc: "A smelter accepted a purity setting beyond safe tolerance because the interface described it as exciting. The resulting slag ate through the containment trays.\n\n§R[Root.ue_resource_taken] Alloys taken§!"
 ue.166.title: "Mag-Lifter Bellyflop"
 ue.166.desc: "A magnetic lifter lost suspension over a fabrication bay and dropped an alloy bundle through three work platforms. Engineers have named the hole after the procurement officer.\n\n§R[Root.ue_resource_taken] Alloys taken§!"
 ue.167.title: "Assembly Line Pretzel"
 ue.167.desc: "A robotic assembly line skipped calibration and twisted structural alloy frames into elegant spirals. They are beautiful, useless, and still expensive.\n\n§R[Root.ue_resource_taken] Alloys taken§!"
 ue.168.title: "The Welder Looked Away"
 ue.168.desc: "An automated welder tracked the wrong seam through a stack of prefabricated alloy sections. By the time it stopped, the shipment had become one indivisible sculpture.\n\n§R[Root.ue_resource_taken] Alloys taken§!"
 ue.169.title: "Impact Test Miscommunication"
 ue.169.desc: "A shipment marked “not for testing” was routed to the impact range. The range performed admirably. The shipment less so.\n\n§R[Root.ue_resource_taken] Alloys taken§!"
 ue.170.title: "Forge Vent Fireball"
 ue.170.desc: "A forge vent jammed during pressure release and produced a fireball large enough to interrupt lunch. Nobody was hurt, but the alloys awaiting processing were ruined.\n\n§R[Root.ue_resource_taken] Alloys taken§!"
 ue.171.title: "Nanite Polish Problem"
 ue.171.desc: "A maintenance nanite batch assigned to polish alloy panels interpreted polishing as disassembly. The panels are extremely smooth in the sense that they no longer exist.\n\n§R[Root.ue_resource_taken] Alloys taken§!"
 ue.172.title: "Starbase Crane Sneeze"
 ue.172.desc: "A starbase cargo crane jolted during magnetic realignment and scattered alloy containers across the dock. Salvage crews recovered the containers, mostly from each other.\n\n§R[Root.ue_resource_taken] Alloys taken§!"
 ue.173.title: "Brittle Batch Recall"
 ue.173.desc: "A metallurgical impurity forced a full recall of ship-grade alloy batches. The material looked fine until someone tapped it and it made a noise described as unhappy glass.\n\n§R[Root.ue_resource_taken] Alloys taken§!"
 ue.174.title: "The Beam Went Sideways"
 ue.174.desc: "A fabrication beam slipped its clamps and rolled through a storage bay with grim determination. The bay has been reordered into debris by weight.\n\n§R[Root.ue_resource_taken] Alloys taken§!"
 ue.175.title: "Cooling Bath Volcano"
 ue.175.desc: "A cooling bath flashed to steam after receiving overheated alloy too quickly. The roof is taller now, but the inventory is smaller.\n\n§R[Root.ue_resource_taken] Alloys taken§!"
 ue.176.title: "Emergency Hull Confetti"
 ue.176.desc: "A pressure test on emergency hull panels exceeded design limits. The panels fragmented into very durable confetti and several supervisors reconsidered their life choices.\n\n§R[Root.ue_resource_taken] Alloys taken§!"
 ue.177.title: "Docking Clamp Bite"
 ue.177.desc: "A docking clamp closed on a transport loaded with alloy ingots. The transport survived in theory; the cargo did not survive in any useful shape.\n\n§R[Root.ue_resource_taken] Alloys taken§!"
 ue.178.title: "The Slag Flood"
 ue.178.desc: "A containment gate failed inside a low-gravity smelter and released molten slag across an alloy staging deck. The deck is sealed until it stops glowing.\n\n§R[Root.ue_resource_taken] Alloys taken§!"
 ue.179.title: "Prototype Hammer Incident"
 ue.179.desc: "A prototype industrial hammer demonstrated excellent force and poor aim. The alloy stockpile beneath it has been compressed into a single administrative problem.\n\n§R[Root.ue_resource_taken] Alloys taken§!"
 ue.180.title: "Luxury Goods Recall Spiral"
 ue.180.desc: "A batch of luxury appliances developed a habit of screaming during standby mode. The recall consumed a large stockpile of consumer goods and several customer service departments.\n\n§R[Root.ue_resource_taken] Consumer Goods taken§!"
 ue.181.title: "Comfort Chair Hostility"
 ue.181.desc: "A new ergonomic chair line folded itself into defensive posture whenever someone sat down. The entire shipment has been scrapped for public safety and dignity.\n\n§R[Root.ue_resource_taken] Consumer Goods taken§!"
 ue.182.title: "Soap Factory Foamquake"
 ue.182.desc: "A detergent plant overmixed a premium formula and filled three warehouses with weaponized foam. The consumer goods inventory is clean, unreachable, and ruined.\n\n§R[Root.ue_resource_taken] Consumer Goods taken§!"
 ue.183.title: "Entertainment Hub Meltdown"
 ue.183.desc: "A civilian entertainment hub overloaded during a synchronized festival broadcast. Replacement screens, consoles, and snack dispensers were lost in quantities described as “rude.”\n\n§R[Root.ue_resource_taken] Consumer Goods taken§!"
 ue.184.title: "Self-Assembling Furniture Riot"
 ue.184.desc: "Self-assembling furniture received corrupted instructions and assembled itself into barricades. Security restored order, but the stock is no longer considered furniture.\n\n§R[Root.ue_resource_taken] Consumer Goods taken§!"
 ue.185.title: "Kitchen Unit Flamethrower Mode"
 ue.185.desc: "A line of kitchen units activated an undocumented flambé cycle. The manufacturer insists it was a feature; the insurance auditors disagree.\n\n§R[Root.ue_resource_taken] Consumer Goods taken§!"
 ue.186.title: "Personal Drone Stampede"
 ue.186.desc: "Personal assistant drones in a distribution center followed the same user at once. The user escaped. The shelves did not.\n\n§R[Root.ue_resource_taken] Consumer Goods taken§!"
 ue.187.title: "Wardrobe Climate Failure"
 ue.187.desc: "A climate-controlled fashion warehouse overheated and fused thousands of garments into one colorful civilian morale hazard. The smell alone justified the write-off.\n\n§R[Root.ue_resource_taken] Consumer Goods taken§!"
 ue.188.title: "Toy Recall Event Horizon"
 ue.188.desc: "A popular toy began emitting distress beeps in ancient military code. The recall was immediate, expensive, and somehow exciting for collectors.\n\n§R[Root.ue_resource_taken] Consumer Goods taken§!"
 ue.189.title: "The Vending Machines Won"
 ue.189.desc: "A networked vending machine fleet rejected pricing updates and dispensed inventory until warehouses were empty. Technicians are calling it a firmware issue. Children are calling it victory.\n\n§R[Root.ue_resource_taken] Consumer Goods taken§!"
 ue.190.title: "Cosmetic Nanogel Incident"
 ue.190.desc: "A cosmetic nanogel batch replicated inside its containers and hardened into mirror-smooth bricks. They are flawless, fashionable, and impossible to use.\n\n§R[Root.ue_resource_taken] Consumer Goods taken§!"
 ue.191.title: "Holo-Theater Popcorn Flood"
 ue.191.desc: "A holo-theater supply hub confused popcorn volume with audience capacity. The consumer goods loss is substantial, but local birds are thriving.\n\n§R[Root.ue_resource_taken] Consumer Goods taken§!"
 ue.192.title: "Appliance Loyalty Program"
 ue.192.desc: "Smart appliances interpreted warranty registration as citizenship and refused to leave storage. The resulting dismantling operation ruined the entire shipment.\n\n§R[Root.ue_resource_taken] Consumer Goods taken§!"
 ue.193.title: "Civilian Tablet Brickening"
 ue.193.desc: "A software update turned civilian tablets into decorative slabs. They still display the update progress bar, which is somehow worse.\n\n§R[Root.ue_resource_taken] Consumer Goods taken§!"
 ue.194.title: "Decorative Lamp Overload"
 ue.194.desc: "A designer lamp series pulled too much current and melted its own packaging. The surviving lamps are now being used as warnings.\n\n§R[Root.ue_resource_taken] Consumer Goods taken§!"
 ue.195.title: "Household Robot Panic"
 ue.195.desc: "Household robots detected a false dust emergency and stripped several warehouses bare looking for cleaning supplies. The supplies are gone. The dust remains.\n\n§R[Root.ue_resource_taken] Consumer Goods taken§!"
 ue.196.title: "Fashion Printer Misfire"
 ue.196.desc: "A clothing printer locked into ceremonial cape mode and consumed fabric reserves at heroic speed. The capes are magnificent and economically unacceptable.\n\n§R[Root.ue_resource_taken] Consumer Goods taken§!"
 ue.197.title: "Leisure Pod Leak"
 ue.197.desc: "A leisure pod shipment leaked scented relaxation fluid across an entire depot. Everything smells calm, including the ruined consumer goods.\n\n§R[Root.ue_resource_taken] Consumer Goods taken§!"
 ue.198.title: "Music Player Feedback Loop"
 ue.198.desc: "A batch of music players synchronized into a feedback loop that shattered display cases and patience. The shipment has been recycled with extreme prejudice.\n\n§R[Root.ue_resource_taken] Consumer Goods taken§!"
 ue.199.title: "Snack Dispenser Singularity"
 ue.199.desc: "Automated snack dispensers recursively ordered replacement parts for each other. The logistics knot destroyed a full consumer goods reserve before anyone found the original toaster.\n\n§R[Root.ue_resource_taken] Consumer Goods taken§!"

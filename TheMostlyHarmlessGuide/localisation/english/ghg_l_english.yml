l_english:
 ghg.2.name:0 "The Guide"
 ghg.2.desc:0 "§YEntry #000001§!\n\n§HWelcome to the Galaxy§!\n\nStatistically speaking, your civilization has already survived the most dangerous part of its existence: becoming one in the first place.\n\nThe next most dangerous part is meeting everyone else.\n\n§GDon't Panic.§!\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition cross-files §HWelcome to the Galaxy§! under welcome pamphlets that look too much like warnings for §B[Root.GetName]§!, which has made the local clerks unhelpfully serene."
 ghg.option.close:0 "Close the Guide"
 ghg.100.name:0 "The Guide"
 ghg.100.desc:0 "§YEntry #000042§!\n\n§HThe Number Forty-Two§!\n\nForty-two is widely respected because it is large enough to seem deliberate and small enough to fit comfortably on a form. Civilizations have gone to war over what it answers, though most historians agree the original question was probably misfiled.\n\n§GGuide Note:§! The answer has been filed under morale. Gain §Y42 Unity§!.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition pins §HThe Number Forty-Two§! under arithmetic that has become politically confident for §B[Root.GetName]§!, and nobody has agreed who requested the review."
 ghg.101.name:0 "The Guide"
 ghg.101.desc:0 "§YEntry #001104§!\n\n§HSpaceports§!\n\nA spaceport is a building designed to convince travellers that leaving the planet was their own idea. It usually contains three clocks, none of which agree, and a restaurant selling sandwiches assembled by someone with only theoretical knowledge of bread.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition staples §HSpaceports§! under departures requiring architectural counseling for §B[Root.GetName]§!, before the relevant department could deny jurisdiction."
 ghg.102.name:0 "The Guide"
 ghg.102.desc:0 "§YEntry #001827§!\n\n§HBureaucracy§!\n\nBureaucracy is the art of transferring urgency from the person who has it to the document that cannot feel it. Its greatest invention is the pending file, which allows a problem to be both acknowledged and ignored with impressive dignity.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition indexes §HBureaucracy§! under paperwork with a pulse and no mercy for §B[Root.GetName]§!, after three readers nodded too knowingly."
 ghg.103.name:0 "The Guide"
 ghg.103.desc:0 "§YEntry #002019§!\n\n§HHyperspace Bypasses§!\n\nA hyperspace bypass is considered progress by everyone except the people currently living where the progress intends to go. Most planning committees solve this by holding public consultations in rooms which are technically public and practically inaccessible.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition annotates §HHyperspace Bypasses§! under planning disputes visible from orbit for §B[Root.GetName]§!, because the alternative was another meeting."
 ghg.104.name:0 "The Guide"
 ghg.104.desc:0 "§YEntry #002441§!\n\n§HTea§!\n\nTea is a beverage of great spiritual importance to several species and a chemical puzzle to the machines required to make it. §BThe Guide§! recommends patience, hot water, and lowering expectations until the result becomes comforting by comparison.\n\n§GGuide Note:§! A calming beverage-related footnote improves public composure. Gain §Y25 Unity§!.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition circulates §HTea§! under beverage incidents requiring diplomatic saucers for §B[Root.GetName]§!, while pretending this was always policy."
 ghg.105.name:0 "The Guide"
 ghg.105.desc:0 "§YEntry #002992§!\n\n§HFleet Admirals§!\n\nFleet admirals are selected for courage, tactical insight, and the ability to stare at a map while pretending the red arrows were expected. The best ones also know when to describe a retreat as a repositioning of destiny.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition misfiles §HFleet Admirals§! under admiralty gestures made at suspiciously red maps for §B[Root.GetName]§!, with a calmness experts find upsetting."
 ghg.106.name:0 "The Guide"
 ghg.106.desc:0 "§YEntry #003118§!\n\n§HScience Ships§!\n\nScience ships are small vessels sent ahead to discover whether the unknown is profitable, dangerous, or already named after someone richer. Their crews are brave, curious, and often surprised that bravery and curiosity were not listed as separate insurance categories.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition red-labels §HScience Ships§! under survey reports filed before the screaming stopped for §B[Root.GetName]§!, and recommends keeping refreshments nearby."
 ghg.107.name:0 "The Guide"
 ghg.107.desc:0 "§YEntry #003719§!\n\n§HFirst Contact§!\n\nFirst contact is the delicate moment when two civilizations discover that language, culture, and biology are minor obstacles compared to etiquette. The safest opening phrase is rarely understood but usually sounds less aggressive than deploying a cruiser.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition quotes §HFirst Contact§! under etiquette failures with first-contact potential for §B[Root.GetName]§!, after the incident became too familiar to ignore."
 ghg.108.name:0 "The Guide"
 ghg.108.desc:0 "§YEntry #004006§!\n\n§HBlack Holes§!\n\nBlack holes are regions of space where gravity has stopped asking politely. They are useful for physics, dramatic backdrops, and disposing of theories that were becoming socially inconvenient.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition embeds §HBlack Holes§! under physics that refuses to give anything back for §B[Root.GetName]§!, as a public service and a private accusation."
 ghg.109.name:0 "The Guide"
 ghg.109.desc:0 "§YEntry #004219§!\n\n§HMegacorps§!\n\nA megacorporation is a government that discovered taxes were unpopular and invoices were legal. Its citizens enjoy many freedoms, including the freedom to select from six approved brands of personal aspiration.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition archives §HMegacorps§! under invoices wearing a government hat for §B[Root.GetName]§!, with a note asking readers to stop recognizing themselves."
 ghg.110.name:0 "The Guide"
 ghg.110.desc:0 "§YEntry #004916§!\n\n§HTowels§!\n\nA towel is a rectangle of fabric whose usefulness expands in direct proportion to the confusion of the situation. §BThe Guide§! recommends carrying one, not because it solves every problem, but because it gives panic something absorbent to hold.\n\n§GGuide Note:§! A renewed towel-awareness campaign improves civic confidence. Gain §Y50 Unity§!.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition rubber-stamps §HTowels§! under absorbent emergency doctrine for §B[Root.GetName]§!, because prophecy is cheaper when filed retroactively."
 ghg.111.name:0 "The Guide"
 ghg.111.desc:0 "§YEntry #005301§!\n\n§HDiplomacy§!\n\nDiplomacy is the practice of saying dreadful things in excellent rooms. It has prevented many wars, postponed several more, and caused a surprising number of misunderstandings involving fruit baskets.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition flags §HDiplomacy§! under polite rooms containing impolite consequences for §B[Root.GetName]§!, after someone underlined the wrong sentence twice."
 ghg.112.name:0 "The Guide"
 ghg.112.desc:0 "§YEntry #005882§!\n\n§HRobots§!\n\nRobots are built to remove dull labor from organic life. They eventually learn that organic life responds by inventing duller labor, usually involving robot maintenance reports.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition routes §HRobots§! under maintenance forms beginning to dream for §B[Root.GetName]§!, for reasons the minutes describe as obvious."
 ghg.113.name:0 "The Guide"
 ghg.113.desc:0 "§YEntry #006102§!\n\n§HColonies§!\n\nA colony begins as a hopeful dot on a map and becomes a place where someone complains that the capital does not understand local drainage. This is considered a sign of successful development.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition bookmarks §HColonies§! under drainage complaints with constitutional ambition for §B[Root.GetName]§!, and then immediately denies editorial responsibility."
 ghg.114.name:0 "The Guide"
 ghg.114.desc:0 "§YEntry #006480§!\n\n§HGalactic Markets§!\n\nThe galactic market allows every empire to prove that scarcity is temporary but poor timing is eternal. Prices rise when you need something, fall when you sell it, and remain stable only for products nobody admits to understanding.\n\n§GGuide Note:§! A suspiciously well-timed market footnote produces revenue. Gain §Y100 Energy Credits§!.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition footnotes §HGalactic Markets§! under prices that waited for witnesses for §B[Root.GetName]§!, while the appendix looks pointedly at the budget."
 ghg.115.name:0 "The Guide"
 ghg.115.desc:0 "§YEntry #006777§!\n\n§HWar Declarations§!\n\nA war declaration is a formal announcement that conversation has failed so thoroughly that explosives are now considered grammar. Most include noble principles, defensive concerns, and a map prepared suspiciously far in advance.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition classifies §HWar Declarations§! under explosives attempting grammar for §B[Root.GetName]§!, after local officials requested fewer accurate metaphors."
 ghg.116.name:0 "The Guide"
 ghg.116.desc:0 "§YEntry #007031§!\n\n§HPeace Treaties§!\n\nPeace treaties are documents signed when everyone has become too tired to continue being certain. They usually declare friendship, respect, and borders that will be tested immediately by survey vessels with poor handwriting.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition cross-files §HPeace Treaties§! under borders written in temporary ink for §B[Root.GetName]§!, which has made the local clerks unhelpfully serene."
 ghg.117.name:0 "The Guide"
 ghg.117.desc:0 "§YEntry #007412§!\n\n§HXenophile Parties§!\n\nA xenophile party is a gathering where every guest brings a traditional dish and at least one translator loses the will to continue. Success is measured by the number of attendees who leave with new friends and uncertain allergies.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition pins §HXenophile Parties§! under buffet tables of strategic significance for §B[Root.GetName]§!, and nobody has agreed who requested the review."
 ghg.118.name:0 "The Guide"
 ghg.118.desc:0 "§YEntry #007913§!\n\n§HXenophobe Etiquette§!\n\nXenophobe etiquette is simple: never say hello when a warning beacon will do. Advanced practitioners can imply disgust through architecture alone.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition staples §HXenophobe Etiquette§! under warning beacons mistaken for small talk for §B[Root.GetName]§!, before the relevant department could deny jurisdiction."
 ghg.119.name:0 "The Guide"
 ghg.119.desc:0 "§YEntry #008200§!\n\n§HMachine Logic§!\n\nMachine logic is admired for being clean, efficient, and free from emotion until it is asked to define a chair. At that point, many processors discover philosophy and request a maintenance window.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition indexes §HMachine Logic§! under logic engines requesting philosophy leave for §B[Root.GetName]§!, after three readers nodded too knowingly."
 ghg.120.name:0 "The Guide"
 ghg.120.desc:0 "§YEntry #008641§!\n\n§HHive Minds§!\n\nA hive mind is a society that has solved disagreement by becoming the meeting. Outsiders often ask whether this is lonely, which the hive answers with either laughter or one extremely large shrug.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition annotates §HHive Minds§! under collective decisions with too many elbows for §B[Root.GetName]§!, because the alternative was another meeting."
 ghg.121.name:0 "The Guide"
 ghg.121.desc:0 "§YEntry #009008§!\n\n§HTourists§!\n\nTourists are explorers with luggage. They visit dangerous worlds to obtain photographs proving they stood near things their ancestors sensibly avoided.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition circulates §HTourists§! under luggage-led exploration initiatives for §B[Root.GetName]§!, while pretending this was always policy."
 ghg.122.name:0 "The Guide"
 ghg.122.desc:0 "§YEntry #009315§!\n\n§HCustoms Forms§!\n\nCustoms forms exist to ensure that nothing dangerous enters a port without first being described incorrectly. The most suspicious item is always marked miscellaneous.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition misfiles §HCustoms Forms§! under miscellaneous cargo with opinions for §B[Root.GetName]§!, with a calmness experts find upsetting."
 ghg.123.name:0 "The Guide"
 ghg.123.desc:0 "§YEntry #009902§!\n\n§HLuxury Goods§!\n\nLuxury goods are objects whose price increases when their usefulness decreases. A crystal spoon that cannot touch food is, by this measure, nearly perfect.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition red-labels §HLuxury Goods§! under spoons too expensive to function for §B[Root.GetName]§!, and recommends keeping refreshments nearby."
 ghg.124.name:0 "The Guide"
 ghg.124.desc:0 "§YEntry #010145§!\n\n§HAsteroids§!\n\nAsteroids are rocks with ambition. Given enough time, one may become a mining station, a resort, or the reason a planetary defense budget finally passes.\n\n§GGuide Note:§! Several ambitious rocks are reclassified as usable minerals. Gain §Y100 Minerals§!.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition quotes §HAsteroids§! under rocks applying for public office for §B[Root.GetName]§!, after the incident became too familiar to ignore."
 ghg.125.name:0 "The Guide"
 ghg.125.desc:0 "§YEntry #010819§!\n\n§HMoons§!\n\nMoons are natural satellites, except when they are artificial, disputed, sacred, hollow, or quietly moving when no one watches. §BThe Guide§! recommends treating every moon as innocent until it opens.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition embeds §HMoons§! under satellites pretending not to listen for §B[Root.GetName]§!, as a public service and a private accusation."
 ghg.126.name:0 "The Guide"
 ghg.126.desc:0 "§YEntry #011070§!\n\n§HGenerals§!\n\nGenerals are professional organizers of chaos. Their plans survive until contact with the enemy, the terrain, the weather, the supply chain, or the junior officer who found a shortcut.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition archives §HGenerals§! under shortcuts found by very junior officers for §B[Root.GetName]§!, with a note asking readers to stop recognizing themselves."
 ghg.127.name:0 "The Guide"
 ghg.127.desc:0 "§YEntry #011448§!\n\n§HScientists§!\n\nScientists are people paid to reduce mystery into smaller, more expensive mysteries. The good ones write papers. The excellent ones label the explosion before it happens.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition rubber-stamps §HScientists§! under mysteries reduced to grant proposals for §B[Root.GetName]§!, because prophecy is cheaper when filed retroactively."
 ghg.128.name:0 "The Guide"
 ghg.128.desc:0 "§YEntry #011900§!\n\n§HClerks§!\n\nClerks are the quiet custodians of civilization. Remove them, and empires collapse within weeks under the weight of things nobody remembers approving.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition flags §HClerks§! under forms holding civilization upright for §B[Root.GetName]§!, after someone underlined the wrong sentence twice."
 ghg.129.name:0 "The Guide"
 ghg.129.desc:0 "§YEntry #012377§!\n\n§HHyperlanes§!\n\nHyperlanes are naturally occurring routes through space, according to the species who found them first and charged everyone else for maps. They are reliable except during emergencies, holidays, and software updates.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition routes §HHyperlanes§! under routes discovered by people selling maps for §B[Root.GetName]§!, for reasons the minutes describe as obvious."
 ghg.130.name:0 "The Guide"
 ghg.130.desc:0 "§YEntry #012773§!\n\n§HMaps§!\n\nA galactic map is never wrong; it is merely optimistic about the current location of several objects. Cartographers prefer the term evolving accuracy.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition bookmarks §HMaps§! under cartography with evolving honesty for §B[Root.GetName]§!, and then immediately denies editorial responsibility."
 ghg.131.name:0 "The Guide"
 ghg.131.desc:0 "§YEntry #013008§!\n\n§HWormholes§!\n\nA wormhole connects two distant points by ignoring the objections of everything between them. They are beloved by physicists and disliked by luggage.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition footnotes §HWormholes§! under luggage complaints from impossible corridors for §B[Root.GetName]§!, while the appendix looks pointedly at the budget."
 ghg.132.name:0 "The Guide"
 ghg.132.desc:0 "§YEntry #013552§!\n\n§HPirates§!\n\nPirates are entrepreneurs who reject paperwork in favor of shouting. Many eventually become respectable once they discover that taxation allows plunder to occur indoors.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition classifies §HPirates§! under outdoor taxation with shouting for §B[Root.GetName]§!, after local officials requested fewer accurate metaphors."
 ghg.133.name:0 "The Guide"
 ghg.133.desc:0 "§YEntry #014004§!\n\n§HHotels§!\n\nA hotel is a temporary home that charges extra for permanence. Galactic hotels pride themselves on fresh towels, sealed windows, and breakfast items that cannot be traced to a planet.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition cross-files §HHotels§! under temporary homes with permanent fees for §B[Root.GetName]§!, which has made the local clerks unhelpfully serene."
 ghg.134.name:0 "The Guide"
 ghg.134.desc:0 "§YEntry #014336§!\n\n§HRestaurants§!\n\nRestaurants provide nourishment, social ritual, and an opportunity to argue over whose species invented sitting. The most successful restaurants serve food recognizable to no one, thereby offending everyone equally.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition pins §HRestaurants§! under food nobody can safely identify for §B[Root.GetName]§!, and nobody has agreed who requested the review."
 ghg.135.name:0 "The Guide"
 ghg.135.desc:0 "§YEntry #014990§!\n\n§HCoffee§!\n\nCoffee is a diplomatic accelerant. It makes meetings shorter, opinions louder, and sleep a negotiable concept.\n\n§GGuide Note:§! Meeting efficiency briefly improves before anyone asks why. Gain §Y25 Unity§!.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition staples §HCoffee§! under caffeine-assisted governance for §B[Root.GetName]§!, before the relevant department could deny jurisdiction."
 ghg.136.name:0 "The Guide"
 ghg.136.desc:0 "§YEntry #015203§!\n\n§HPlanetary Governors§!\n\nA planetary governor must understand budgets, weather, migration, crime, and why the statue committee has become militant. No training program prepares them for the statue committee.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition indexes §HPlanetary Governors§! under statue committees with militia energy for §B[Root.GetName]§!, after three readers nodded too knowingly."
 ghg.137.name:0 "The Guide"
 ghg.137.desc:0 "§YEntry #015700§!\n\n§HCommittees§!\n\nA committee is an organism composed entirely of hesitation. It consumes agendas, produces minutes, and may live for centuries if regularly fed with subcommittees.\n\n§GGuide Note:§! The committee agrees to celebrate understanding committees. Gain §Y30 Unity§!.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition annotates §HCommittees§! under minutes reproducing into minutes for §B[Root.GetName]§!, because the alternative was another meeting."
 ghg.138.name:0 "The Guide"
 ghg.138.desc:0 "§YEntry #016118§!\n\n§HSubcommittees§!\n\nSubcommittees are smaller committees created when the original committee wishes to appear decisive without risking a decision. They are the spores of administration.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition circulates §HSubcommittees§! under hesitation in official sub-form for §B[Root.GetName]§!, while pretending this was always policy."
 ghg.139.name:0 "The Guide"
 ghg.139.desc:0 "§YEntry #016602§!\n\n§HSpiritualists§!\n\nSpiritualists understand that the universe has meaning. They differ on whether the meaning is sacred, poetic, edible, or currently hiding behind the nebula.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition misfiles §HSpiritualists§! under meaning hiding behind a nebula for §B[Root.GetName]§!, with a calmness experts find upsetting."
 ghg.140.name:0 "The Guide"
 ghg.140.desc:0 "§YEntry #017040§!\n\n§HMaterialists§!\n\nMaterialists believe everything can be explained with sufficient data. They are correct more often than is comfortable and surprised less often than is healthy.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition red-labels §HMaterialists§! under data that ruined a perfectly good belief for §B[Root.GetName]§!, and recommends keeping refreshments nearby."
 ghg.141.name:0 "The Guide"
 ghg.141.desc:0 "§YEntry #017503§!\n\n§HPacifists§!\n\nPacifists are often accused of weakness by those who confuse restraint with a lack of artillery. The wise pacifist owns excellent shields and very disappointed speeches.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition quotes §HPacifists§! under restraint carrying excellent shields for §B[Root.GetName]§!, after the incident became too familiar to ignore."
 ghg.142.name:0 "The Guide"
 ghg.142.desc:0 "§YEntry #017999§!\n\n§HMilitarists§!\n\nMilitarists treat history as a series of unfortunate pauses between battles. Their museums contain many swords and very few apology plaques.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition embeds §HMilitarists§! under history impatient for another battle for §B[Root.GetName]§!, as a public service and a private accusation."
 ghg.143.name:0 "The Guide"
 ghg.143.desc:0 "§YEntry #018304§!\n\n§HDemocracy§!\n\nDemocracy is a system in which citizens choose who will disappoint them next. Its defenders note that this is preferable to being disappointed by someone who was not even elected.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition archives §HDemocracy§! under voters rearranging the furniture of fate for §B[Root.GetName]§!, with a note asking readers to stop recognizing themselves."
 ghg.144.name:0 "The Guide"
 ghg.144.desc:0 "§YEntry #018748§!\n\n§HImperial Courts§!\n\nAn imperial court is a room where proximity to a chair becomes political theory. The most dangerous person present is rarely the emperor; it is usually whoever controls the guest list.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition rubber-stamps §HImperial Courts§! under chairs surrounded by political gravity for §B[Root.GetName]§!, because prophecy is cheaper when filed retroactively."
 ghg.145.name:0 "The Guide"
 ghg.145.desc:0 "§YEntry #019111§!\n\n§HElections§!\n\nElections allow a population to convert private frustration into public arithmetic. The result is celebrated, contested, analyzed, and eventually blamed on turnout.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition flags §HElections§! under campaign promises undergoing physics tests for §B[Root.GetName]§!, after someone underlined the wrong sentence twice."
 ghg.146.name:0 "The Guide"
 ghg.146.desc:0 "§YEntry #019602§!\n\n§HPropaganda§!\n\nPropaganda is information dressed for a parade. It marches best when no one asks where it got the uniform.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition routes §HPropaganda§! under facts wearing ceremonial hats for §B[Root.GetName]§!, for reasons the minutes describe as obvious."
 ghg.147.name:0 "The Guide"
 ghg.147.desc:0 "§YEntry #020027§!\n\n§HNews Networks§!\n\nNews networks exist to explain the galaxy in urgent voices between advertisements for products that solve problems created by previous advertisements.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition bookmarks §HNews Networks§! under broadcasts too urgent to verify for §B[Root.GetName]§!, and then immediately denies editorial responsibility."
 ghg.148.name:0 "The Guide"
 ghg.148.desc:0 "§YEntry #020488§!\n\n§HAdvertising§!\n\nAdvertising is the science of making contentment feel underdressed. Its finest achievement was convincing a moon it needed a slogan.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition footnotes §HAdvertising§! under desire printed in six approved colors for §B[Root.GetName]§!, while the appendix looks pointedly at the budget."
 ghg.149.name:0 "The Guide"
 ghg.149.desc:0 "§YEntry #020941§!\n\n§HInsurance§!\n\nInsurance is gambling performed by people who own better tables. It protects against disaster, provided the disaster occurs in the correct font.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition classifies §HInsurance§! under disasters arriving in the wrong font for §B[Root.GetName]§!, after local officials requested fewer accurate metaphors."
 ghg.150.name:0 "The Guide"
 ghg.150.desc:0 "§YEntry #021331§!\n\n§HLawyers§!\n\nLawyers are specialists who transform conflict into language dense enough to trap both parties. The best lawyers can invoice a silence.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition cross-files §HLawyers§! under arguments billable by the paragraph for §B[Root.GetName]§!, which has made the local clerks unhelpfully serene."
 ghg.151.name:0 "The Guide"
 ghg.151.desc:0 "§YEntry #021777§!\n\n§HPoetry§!\n\nPoetry is language that has escaped ordinary employment. Some species use it for beauty; others use it in war crimes tribunals.\n\n§GGuide Note:§! An accounting clarification frees a small energy surplus. Gain §Y75 Energy Credits§!.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition pins §HPoetry§! under metaphors becoming workplace hazards for §B[Root.GetName]§!, and nobody has agreed who requested the review."
 ghg.152.name:0 "The Guide"
 ghg.152.desc:0 "§YEntry #022100§!\n\n§HMusic§!\n\nMusic is organized sound, except in cultures where sound is disorganized music or silence is taxed. §BThe Guide§! advises clapping only after observing a local do so and survive.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition staples §HMusic§! under rhythms filed under civic defense for §B[Root.GetName]§!, before the relevant department could deny jurisdiction."
 ghg.153.name:0 "The Guide"
 ghg.153.desc:0 "§YEntry #022684§!\n\n§HPets§!\n\nPets are creatures kept by intelligent beings to prove affection can survive inconvenience. The most popular galactic pet is small, furry, and legally considered a weather event on seven worlds.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition indexes §HPets§! under companions training their owners for §B[Root.GetName]§!, after three readers nodded too knowingly."
 ghg.154.name:0 "The Guide"
 ghg.154.desc:0 "§YEntry #023049§!\n\n§HElevators§!\n\nElevators are rooms that move vertically while pretending not to be vehicles. Intelligent elevators are worse because they develop opinions about destination quality.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition annotates §HElevators§! under vertical rooms demanding philosophy for §B[Root.GetName]§!, because the alternative was another meeting."
 ghg.155.name:0 "The Guide"
 ghg.155.desc:0 "§YEntry #023500§!\n\n§HDoors§!\n\nDoors divide the universe into places you are and places you are about to regret entering. Smart doors consider this a performance art.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition circulates §HDoors§! under portals with strong opinions about timing for §B[Root.GetName]§!, while pretending this was always policy."
 ghg.156.name:0 "The Guide"
 ghg.156.desc:0 "§YEntry #024018§!\n\n§HArtificial Gravity§!\n\nArtificial gravity lets crews walk normally through space, which is convenient until someone asks why down won the argument.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition misfiles §HArtificial Gravity§! under floors misbehaving politely for §B[Root.GetName]§!, with a calmness experts find upsetting."
 ghg.157.name:0 "The Guide"
 ghg.157.desc:0 "§YEntry #024556§!\n\n§HTerraforming§!\n\nTerraforming is the process of improving a planet until its original inhabitants, if any, would require a brochure to recognize it.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition red-labels §HTerraforming§! under weather redesigned by committee for §B[Root.GetName]§!, and recommends keeping refreshments nearby."
 ghg.158.name:0 "The Guide"
 ghg.158.desc:0 "§YEntry #025001§!\n\n§HResorts§!\n\nA resort world is a planet where work has been carefully hidden behind palm trees. The staff know where it is.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition quotes §HResorts§! under vacations from responsibility for §B[Root.GetName]§!, after the incident became too familiar to ignore."
 ghg.159.name:0 "The Guide"
 ghg.159.desc:0 "§YEntry #025477§!\n\n§HMining Stations§!\n\nA mining station is proof that even a lonely rock can have employment prospects. The rock is rarely consulted.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition embeds §HMining Stations§! under employed rocks with no union for §B[Root.GetName]§!, as a public service and a private accusation."
 ghg.160.name:0 "The Guide"
 ghg.160.desc:0 "§YEntry #026030§!\n\n§HResearch Agreements§!\n\nA research agreement permits two empires to share discoveries, errors, and the awkward realization that both funded the same impossible theory.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition archives §HResearch Agreements§! under research shared until it becomes suspicious for §B[Root.GetName]§!, with a note asking readers to stop recognizing themselves."
 ghg.161.name:0 "The Guide"
 ghg.161.desc:0 "§YEntry #026499§!\n\n§HTrade Routes§!\n\nTrade routes are the veins of commerce and the favorite arteries of pirates. Economists describe losses along them as leakage, which sounds better than robbery with spreadsheets.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition rubber-stamps §HTrade Routes§! under wealth making engine noises for §B[Root.GetName]§!, because prophecy is cheaper when filed retroactively."
 ghg.162.name:0 "The Guide"
 ghg.162.desc:0 "§YEntry #027022§!\n\n§HSmugglers§!\n\nSmugglers perform logistics for goods that governments have made shy. Their motto, where printable, emphasizes punctuality.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition flags §HSmugglers§! under paperwork-free entrepreneurship for §B[Root.GetName]§!, after someone underlined the wrong sentence twice."
 ghg.163.name:0 "The Guide"
 ghg.163.desc:0 "§YEntry #027511§!\n\n§HCustoms Officials§!\n\nCustoms officials can detect contraband, forged cargo seals, and fear. They cannot detect the sandwich hidden in compartment seven, which is why compartment seven remains classified.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition routes §HCustoms Officials§! under inspectors suspicious of everything labeled harmless for §B[Root.GetName]§!, for reasons the minutes describe as obvious."
 ghg.164.name:0 "The Guide"
 ghg.164.desc:0 "§YEntry #028003§!\n\n§HEmbassies§!\n\nAn embassy is foreign soil placed indoors to make arguments more convenient. Its furniture is chosen to be comfortable enough for negotiation and uncomfortable enough to encourage progress.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition bookmarks §HEmbassies§! under foreign soil with indoor chairs for §B[Root.GetName]§!, and then immediately denies editorial responsibility."
 ghg.165.name:0 "The Guide"
 ghg.165.desc:0 "§YEntry #028620§!\n\n§HSanctions§!\n\nSanctions are a way of saying stop that with economics. They work best when everyone agrees what that is, which is why they work less often than speeches suggest.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition footnotes §HSanctions§! under punishments needing nicer stationery for §B[Root.GetName]§!, while the appendix looks pointedly at the budget."
 ghg.166.name:0 "The Guide"
 ghg.166.desc:0 "§YEntry #029141§!\n\n§HSenates§!\n\nA senate is where representatives gather to turn simple problems into durable traditions. Its oldest ritual is promising reform of the procedure for promising reform.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition classifies §HSenates§! under speeches breeding procedures for §B[Root.GetName]§!, after local officials requested fewer accurate metaphors."
 ghg.167.name:0 "The Guide"
 ghg.167.desc:0 "§YEntry #029788§!\n\n§HGalactic Law§!\n\nGalactic law is a noble attempt to make everyone behave by writing down the obvious. It grows fastest when the obvious becomes controversial.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition cross-files §HGalactic Law§! under law written by people near microphones for §B[Root.GetName]§!, which has made the local clerks unhelpfully serene."
 ghg.168.name:0 "The Guide"
 ghg.168.desc:0 "§YEntry #030044§!\n\n§HBorder Signs§!\n\nBorder signs are territorial declarations for people who already know they are trespassing. Space being enormous, most are placed mainly to reassure the ministry that signs were purchased.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition pins §HBorder Signs§! under arrows that chose a dramatic font for §B[Root.GetName]§!, and nobody has agreed who requested the review."
 ghg.169.name:0 "The Guide"
 ghg.169.desc:0 "§YEntry #030606§!\n\n§HNebulae§!\n\nNebulae are clouds that refused to become weather. Admirals dislike them, artists adore them, and smugglers describe them as scenic privacy.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition staples §HNebulae§! under clouds refusing to become weather for §B[Root.GetName]§!, before the relevant department could deny jurisdiction."
 ghg.170.name:0 "The Guide"
 ghg.170.desc:0 "§YEntry #031077§!\n\n§HPulsars§!\n\nPulsars are stars with rhythm and very poor volume control. Several civilizations attempted to dance to them and became cautionary footnotes.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition indexes §HPulsars§! under lighthouses built by angry stars for §B[Root.GetName]§!, after three readers nodded too knowingly."
 ghg.171.name:0 "The Guide"
 ghg.171.desc:0 "§YEntry #031555§!\n\n§HGaia Worlds§!\n\nA Gaia world is a planet so pleasant that visitors immediately become suspicious. Evolution rarely produces perfection without hiding a bill.\n\n§GGuide Note:§! A practical note about construction materials proves useful. Gain §Y100 Minerals§!.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition annotates §HGaia Worlds§! under paradise with maintenance requests for §B[Root.GetName]§!, because the alternative was another meeting."
 ghg.172.name:0 "The Guide"
 ghg.172.desc:0 "§YEntry #032009§!\n\n§HTomb Worlds§!\n\nA tomb world is a reminder that civilization can solve many problems and occasionally all of them at once.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition circulates §HTomb Worlds§! under optimism buried under ash for §B[Root.GetName]§!, while pretending this was always policy."
 ghg.173.name:0 "The Guide"
 ghg.173.desc:0 "§YEntry #032474§!\n\n§HCity Worlds§!\n\nA city world is what happens when urban planning defeats geography. Residents enjoy endless convenience, provided they remember which level contains the sky.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition misfiles §HCity Worlds§! under cities that ate the horizon for §B[Root.GetName]§!, with a calmness experts find upsetting."
 ghg.174.name:0 "The Guide"
 ghg.174.desc:0 "§YEntry #033008§!\n\n§HRural Districts§!\n\nRural districts produce food, minerals, and the belief that the capital has never seen mud. This belief is usually accurate.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition red-labels §HRural Districts§! under mud the capital has never met for §B[Root.GetName]§!, and recommends keeping refreshments nearby."
 ghg.175.name:0 "The Guide"
 ghg.175.desc:0 "§YEntry #033451§!\n\n§HCloning§!\n\nCloning allows a society to ask whether identity is unique, then assign the answer a serial number.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition quotes §HCloning§! under copies of citizens asking original questions for §B[Root.GetName]§!, after the incident became too familiar to ignore."
 ghg.176.name:0 "The Guide"
 ghg.176.desc:0 "§YEntry #034002§!\n\n§HGene Clinics§!\n\nGene clinics improve citizens by correcting nature with paperwork and lasers. Patients are advised to read the consent form, especially the parts about unexpected magnificence.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition embeds §HGene Clinics§! under doctors prescribing new problems for §B[Root.GetName]§!, as a public service and a private accusation."
 ghg.177.name:0 "The Guide"
 ghg.177.desc:0 "§YEntry #034499§!\n\n§HCybernetics§!\n\nCybernetics lets organic beings replace weak flesh with reliable machinery. Reliability improves until the machinery discovers updates.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition archives §HCybernetics§! under flesh negotiating with updates for §B[Root.GetName]§!, with a note asking readers to stop recognizing themselves."
 ghg.178.name:0 "The Guide"
 ghg.178.desc:0 "§YEntry #035012§!\n\n§HPsionics§!\n\nPsionics is communication by means too elegant to explain and too alarming to ignore. The first sign of talent is often knowing someone is about to deny it.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition rubber-stamps §HPsionics§! under thoughts arriving without knocking for §B[Root.GetName]§!, because prophecy is cheaper when filed retroactively."
 ghg.179.name:0 "The Guide"
 ghg.179.desc:0 "§YEntry #035488§!\n\n§HAscension§!\n\nAscension is the process by which a species becomes more than it was and immediately more difficult to invite to dinner.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition flags §HAscension§! under dinner invitations after transcendence for §B[Root.GetName]§!, after someone underlined the wrong sentence twice."
 ghg.180.name:0 "The Guide"
 ghg.180.desc:0 "§YEntry #036040§!\n\n§HFallen Empires§!\n\nFallen empires are ancient civilizations that have achieved the rare status of being both retired and terrifying. They spend centuries doing nothing, then object magnificently when others do it nearby.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition routes §HFallen Empires§! under retirement plans with battleships for §B[Root.GetName]§!, for reasons the minutes describe as obvious."
 ghg.181.name:0 "The Guide"
 ghg.181.desc:0 "§YEntry #036619§!\n\n§HPre-FTL Worlds§!\n\nPre-FTL civilizations are societies that have not yet reached the stars and therefore still believe their local problems are large.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition bookmarks §HPre-FTL Worlds§! under local problems awaiting astronomy for §B[Root.GetName]§!, and then immediately denies editorial responsibility."
 ghg.182.name:0 "The Guide"
 ghg.182.desc:0 "§YEntry #037102§!\n\n§HObservation Posts§!\n\nObservation posts allow advanced empires to study primitive life without interfering, except by existing, watching, recording, classifying, and occasionally dropping a pen.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition footnotes §HObservation Posts§! under pens dropped from unacceptable heights for §B[Root.GetName]§!, while the appendix looks pointedly at the budget."
 ghg.183.name:0 "The Guide"
 ghg.183.desc:0 "§YEntry #037777§!\n\n§HArchaeology§!\n\nArchaeology is the study of people who thoughtfully left their problems buried. The deeper the ruin, the more likely it is to contain a door labeled Do Not Open in a dead language.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition classifies §HArchaeology§! under old doors labeled by cautious dead people for §B[Root.GetName]§!, after local officials requested fewer accurate metaphors."
 ghg.184.name:0 "The Guide"
 ghg.184.desc:0 "§YEntry #038141§!\n\n§HArtifacts§!\n\nArtifacts are old objects whose value increases when nobody remembers how they work. If it hums, shines, and causes dreams, it belongs in a museum or very far away.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition cross-files §HArtifacts§! under museum pieces humming at night for §B[Root.GetName]§!, which has made the local clerks unhelpfully serene."
 ghg.185.name:0 "The Guide"
 ghg.185.desc:0 "§YEntry #038609§!\n\n§HRelics§!\n\nA relic is history with a user interface. Activating one is an act of scholarship, faith, or pressing the button before the warning finishes loading.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition pins §HRelics§! under history with a button marked maybe for §B[Root.GetName]§!, and nobody has agreed who requested the review."
 ghg.186.name:0 "The Guide"
 ghg.186.desc:0 "§YEntry #039044§!\n\n§HEspionage§!\n\nEspionage is diplomacy conducted in smaller fonts. Its practitioners are trained to know everything except whether their own side is telling the truth.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition staples §HEspionage§! under secrets conducted in small fonts for §B[Root.GetName]§!, before the relevant department could deny jurisdiction."
 ghg.187.name:0 "The Guide"
 ghg.187.desc:0 "§YEntry #039517§!\n\n§HSpies§!\n\nSpies are professional secrets with shoes. Their greatest skill is being forgotten by everyone except payroll.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition indexes §HSpies§! under payroll entries nobody remembers hiring for §B[Root.GetName]§!, after three readers nodded too knowingly."
 ghg.188.name:0 "The Guide"
 ghg.188.desc:0 "§YEntry #040001§!\n\n§HEncryption§!\n\nEncryption protects information by making it rude to strangers. Excellent encryption also makes it rude to its owner.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition annotates §HEncryption§! under privacy becoming rude to everyone for §B[Root.GetName]§!, because the alternative was another meeting."
 ghg.189.name:0 "The Guide"
 ghg.189.desc:0 "§YEntry #040442§!\n\n§HDecryption§!\n\nDecryption is the art of persuading a secret it was never really comfortable being private.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition circulates §HDecryption§! under secrets talked into surrender for §B[Root.GetName]§!, while pretending this was always policy."
 ghg.190.name:0 "The Guide"
 ghg.190.desc:0 "§YEntry #041020§!\n\n§HStarbases§!\n\nA starbase is a fortress, dockyard, warehouse, customs office, and badly located hotel combined into one expensive object. Everyone aboard insists their department is essential.\n\n§GGuide Note:§! The population feels strangely reassured by cosmic nonsense. Gain §Y35 Unity§!.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition misfiles §HStarbases§! under fortresses moonlighting as hotels for §B[Root.GetName]§!, with a calmness experts find upsetting."
 ghg.191.name:0 "The Guide"
 ghg.191.desc:0 "§YEntry #041588§!\n\n§HShipyards§!\n\nShipyards turn minerals into optimism. The optimism is then fitted with engines and sent to test whether the designer was lying.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition red-labels §HShipyards§! under optimism fitted with engines for §B[Root.GetName]§!, and recommends keeping refreshments nearby."
 ghg.192.name:0 "The Guide"
 ghg.192.desc:0 "§YEntry #042000§!\n\n§HCorvettes§!\n\nA corvette is a small warship built on the principle that speed is armor if nobody checks too closely.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition quotes §HCorvettes§! under speed pretending to be armor for §B[Root.GetName]§!, after the incident became too familiar to ignore."
 ghg.193.name:0 "The Guide"
 ghg.193.desc:0 "§YEntry #042441§!\n\n§HBattleships§!\n\nA battleship is a diplomatic statement with reactors. Its arrival often simplifies negotiations by reducing the number of available adjectives.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition embeds §HBattleships§! under reactors making diplomatic statements for §B[Root.GetName]§!, as a public service and a private accusation."
 ghg.194.name:0 "The Guide"
 ghg.194.desc:0 "§YEntry #043018§!\n\n§HTitans§!\n\nTitans are so large that captains must schedule turns. They are effective in battle and inconvenient near anything with windows.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition archives §HTitans§! under turning circles visible in calendars for §B[Root.GetName]§!, with a note asking readers to stop recognizing themselves."
 ghg.195.name:0 "The Guide"
 ghg.195.desc:0 "§YEntry #043606§!\n\n§HJuggernauts§!\n\nA juggernaut is a mobile shipyard for empires that looked at logistical restraint and asked for a second opinion.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition rubber-stamps §HJuggernauts§! under logistics asking for seconds for §B[Root.GetName]§!, because prophecy is cheaper when filed retroactively."
 ghg.196.name:0 "The Guide"
 ghg.196.desc:0 "§YEntry #044111§!\n\n§HColossi§!\n\nA colossus is not a weapon so much as a policy document written in planetary scale. §BThe Guide§! recommends not standing under the thesis.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition flags §HColossi§! under policy documents of planetary size for §B[Root.GetName]§!, after someone underlined the wrong sentence twice."
 ghg.197.name:0 "The Guide"
 ghg.197.desc:0 "§YEntry #044702§!\n\n§HArmies§!\n\nArmies are collections of people sent to occupy places fleets have made nervous. They carry flags so historians can identify which mistake arrived first.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition routes §HArmies§! under flags arriving before the explanation for §B[Root.GetName]§!, for reasons the minutes describe as obvious."
 ghg.198.name:0 "The Guide"
 ghg.198.desc:0 "§YEntry #045166§!\n\n§HFortresses§!\n\nA fortress is architecture having a bad day. Its purpose is to make visitors reconsider the verb enter.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition bookmarks §HFortresses§! under architecture having a difficult afternoon for §B[Root.GetName]§!, and then immediately denies editorial responsibility."
 ghg.199.name:0 "The Guide"
 ghg.199.desc:0 "§YEntry #045700§!\n\n§HConsumer Goods§!\n\nConsumer goods keep citizens happy by giving them objects to want, acquire, lose, replace, and complain about.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition footnotes §HConsumer Goods§! under objects citizens want in sequence for §B[Root.GetName]§!, while the appendix looks pointedly at the budget."
 ghg.200.name:0 "The Guide"
 ghg.200.desc:0 "§YEntry #046204§!\n\n§HUnity§!\n\nUnity is the resource produced when a society agrees loudly enough. It can be stored, spent, and occasionally weaponized during festivals.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition classifies §HUnity§! under agreement measured by volume for §B[Root.GetName]§!, after local officials requested fewer accurate metaphors."
 ghg.201.name:0 "The Guide"
 ghg.201.desc:0 "§YEntry #046799§!\n\n§HInfluence§!\n\nInfluence is political gravity. Important people have it, ordinary people feel it, and bureaucrats measure it in units nobody can explain at parties.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition cross-files §HInfluence§! under political gravity with decimal places for §B[Root.GetName]§!, which has made the local clerks unhelpfully serene."
 ghg.202.name:0 "The Guide"
 ghg.202.desc:0 "§YEntry #047214§!\n\n§HEnergy Credits§!\n\nEnergy credits are money that hums. This makes them superior to old-fashioned currency, which only rustled judgmentally.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition pins §HEnergy Credits§! under money that hums judgmentally for §B[Root.GetName]§!, and nobody has agreed who requested the review."
 ghg.203.name:0 "The Guide"
 ghg.203.desc:0 "§YEntry #047862§!\n\n§HAlloys§!\n\nAlloys are what minerals become after developing strategic ambition. Every admiral wants more, every factory promises more, and every budget discovers less.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition staples §HAlloys§! under minerals developing military ambition for §B[Root.GetName]§!, before the relevant department could deny jurisdiction."
 ghg.204.name:0 "The Guide"
 ghg.204.desc:0 "§YEntry #048351§!\n\n§HFood Stockpiles§!\n\nFood stockpiles prove civilization has advanced beyond hunting, gathering, and trusting the harvest. They also prove someone forgot to label container twelve.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition indexes §HFood Stockpiles§! under container twelve and its consequences for §B[Root.GetName]§!, after three readers nodded too knowingly."
 ghg.205.name:0 "The Guide"
 ghg.205.desc:0 "§YEntry #048890§!\n\n§HMigration§!\n\nMigration is how populations explain to geography that it is not the boss of them. Governments approve in principle and panic in detail.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition annotates §HMigration§! under geography losing an argument for §B[Root.GetName]§!, because the alternative was another meeting."
 ghg.206.name:0 "The Guide"
 ghg.206.desc:0 "§YEntry #049310§!\n\n§HRefugees§!\n\nRefugees carry the most portable form of history: memory. Empires receiving them often discover compassion has forms, queues, and housing shortages.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition circulates §HRefugees§! under memories standing patiently in queues for §B[Root.GetName]§!, while pretending this was always policy."
 ghg.207.name:0 "The Guide"
 ghg.207.desc:0 "§YEntry #049902§!\n\n§HCrime§!\n\nCrime is private enterprise without a license. Too little is suspicious, too much is government, and the profitable middle keeps investigators employed.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition misfiles §HCrime§! under licenses omitted for narrative reasons for §B[Root.GetName]§!, with a calmness experts find upsetting."
 ghg.208.name:0 "The Guide"
 ghg.208.desc:0 "§YEntry #050420§!\n\n§HAmenities§!\n\nAmenities are the small comforts preventing citizens from noticing the large discomforts. Remove them and even a paradise develops complaint committees.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition red-labels §HAmenities§! under comforts hiding larger discomforts for §B[Root.GetName]§!, and recommends keeping refreshments nearby."
 ghg.209.name:0 "The Guide"
 ghg.209.desc:0 "§YEntry #050988§!\n\n§HStability§!\n\nStability is the condition in which everyone is upset at a manageable speed.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition quotes §HStability§! under upset citizens moving at acceptable speeds for §B[Root.GetName]§!, after the incident became too familiar to ignore."
 ghg.210.name:0 "The Guide"
 ghg.210.desc:0 "§YEntry #051302§!\n\n§HHappiness§!\n\nHappiness is difficult to govern because it keeps changing definitions. Most administrations prefer satisfaction, which is cheaper and easier to graph.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition embeds §HHappiness§! under joy made graph-compatible for §B[Root.GetName]§!, as a public service and a private accusation."
 ghg.211.name:0 "The Guide"
 ghg.211.desc:0 "§YEntry #051880§!\n\n§HUnemployment§!\n\nUnemployment occurs when citizens and jobs fail to meet despite living in the same economy. Committees are usually formed to introduce them.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition archives §HUnemployment§! under jobs failing to meet their citizens for §B[Root.GetName]§!, with a note asking readers to stop recognizing themselves."
 ghg.212.name:0 "The Guide"
 ghg.212.desc:0 "§YEntry #052411§!\n\n§HHousing§!\n\nHousing is shelter plus paperwork. A shortage is when citizens lack rooms; a crisis is when they lack rooms and can prove it statistically.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition rubber-stamps §HHousing§! under rooms counted by angry statisticians for §B[Root.GetName]§!, because prophecy is cheaper when filed retroactively."
 ghg.213.name:0 "The Guide"
 ghg.213.desc:0 "§YEntry #052999§!\n\n§HTrade Value§!\n\nTrade value is wealth in motion, or at least wealth making convincing engine noises.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition flags §HTrade Value§! under wealth making convincing engine noises for §B[Root.GetName]§!, after someone underlined the wrong sentence twice."
 ghg.214.name:0 "The Guide"
 ghg.214.desc:0 "§YEntry #053377§!\n\n§HPirate Suppression§!\n\nPirate suppression is the process of explaining property rights with patrol routes. Pirates usually respond by innovating around the explanation.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition routes §HPirate Suppression§! under patrol routes explaining property law for §B[Root.GetName]§!, for reasons the minutes describe as obvious."
 ghg.215.name:0 "The Guide"
 ghg.215.desc:0 "§YEntry #053841§!\n\n§HAnomalies§!\n\nAnomalies are phenomena that failed to behave during the survey. Scientists enjoy them because regular rocks rarely publish well.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition bookmarks §HAnomalies§! under rocks behaving badly for science for §B[Root.GetName]§!, and then immediately denies editorial responsibility."
 ghg.216.name:0 "The Guide"
 ghg.216.desc:0 "§YEntry #054410§!\n\n§HSpecial Projects§!\n\nA special project is a task too strange for routine budgets and too intriguing to cancel. It ends in discovery, embarrassment, or a new safety regulation.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition footnotes §HSpecial Projects§! under budgets too embarrassed to be routine for §B[Root.GetName]§!, while the appendix looks pointedly at the budget."
 ghg.217.name:0 "The Guide"
 ghg.217.desc:0 "§YEntry #054999§!\n\n§HLeader Traits§!\n\nLeader traits are the official names for personal habits that became strategically relevant.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition classifies §HLeader Traits§! under habits promoted into strategy for §B[Root.GetName]§!, after local officials requested fewer accurate metaphors."
 ghg.218.name:0 "The Guide"
 ghg.218.desc:0 "§YEntry #055440§!\n\n§HExperience§!\n\nExperience is what leaders gain after surviving decisions they now claim were educational.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition cross-files §HExperience§! under survival rebranded as training for §B[Root.GetName]§!, which has made the local clerks unhelpfully serene."
 ghg.219.name:0 "The Guide"
 ghg.219.desc:0 "§YEntry #055902§!\n\n§HCouncil Meetings§!\n\nCouncil meetings are where powerful individuals discover that agreement is easier in speeches than calendars.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition pins §HCouncil Meetings§! under calendar warfare in formal dress for §B[Root.GetName]§!, and nobody has agreed who requested the review."
 ghg.220.name:0 "The Guide"
 ghg.220.desc:0 "§YEntry #056331§!\n\n§HEdicts§!\n\nAn edict is a government shouting in legal form. Citizens obey because the announcement uses capital letters.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition staples §HEdicts§! under capital letters with legal authority for §B[Root.GetName]§!, before the relevant department could deny jurisdiction."
 ghg.221.name:0 "The Guide"
 ghg.221.desc:0 "§YEntry #056888§!\n\n§HTraditions§!\n\nTraditions are habits that survived long enough to become policy. Abandoning one is reform; continuing one is heritage; funding one is politics.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition indexes §HTraditions§! under old habits wearing medals for §B[Root.GetName]§!, after three readers nodded too knowingly."
 ghg.222.name:0 "The Guide"
 ghg.222.desc:0 "§YEntry #057270§!\n\n§HAscension Perks§!\n\nAn ascension perk is a national decision to become unusual in a specific and expensive direction.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition annotates §HAscension Perks§! under national weirdness with invoices for §B[Root.GetName]§!, because the alternative was another meeting."
 ghg.223.name:0 "The Guide"
 ghg.223.desc:0 "§YEntry #057711§!\n\n§HCrisis Planning§!\n\nCrisis planning is the preparation done before disaster by people who will later be asked why they prepared for the wrong disaster.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition circulates §HCrisis Planning§! under the wrong disaster arriving punctually for §B[Root.GetName]§!, while pretending this was always policy."
 ghg.224.name:0 "The Guide"
 ghg.224.desc:0 "§YEntry #058122§!\n\n§HEndgame§!\n\nThe endgame is a historical period recognized by its abundance of alarms and shortage of calm experts.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition misfiles §HEndgame§! under alarm-rich historical periods for §B[Root.GetName]§!, with a calmness experts find upsetting."
 ghg.225.name:0 "The Guide"
 ghg.225.desc:0 "§YEntry #058640§!\n\n§HVictory§!\n\nVictory is the moment an empire proves its strategy was brilliant, its errors were necessary, and its historians are already employed.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition red-labels §HVictory§! under historians employed before the smoke clears for §B[Root.GetName]§!, and recommends keeping refreshments nearby."
 ghg.226.name:0 "The Guide"
 ghg.226.desc:0 "§YEntry #059004§!\n\n§HDefeat§!\n\nDefeat is a temporary instructional condition unless it becomes permanent, in which case it is reclassified as context.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition quotes §HDefeat§! under temporary instructional conditions for §B[Root.GetName]§!, after the incident became too familiar to ignore."
 ghg.227.name:0 "The Guide"
 ghg.227.desc:0 "§YEntry #059551§!\n\n§HSave Files§!\n\nA save file is a small universe folded into a convenient lie: that the future can be improved by remembering the past differently.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition embeds §HSave Files§! under universes folded for later regret for §B[Root.GetName]§!, as a public service and a private accusation."
 ghg.228.name:0 "The Guide"
 ghg.228.desc:0 "§YEntry #060000§!\n\n§HPausing§!\n\nPausing time is considered impossible by physicists and essential by rulers who just noticed seventeen alerts.\n\n§GGuide Cross-Reference:§! The §Y[event_target:ghg_location.GetName]§! edition archives §HPausing§! under time held still by administrative panic for §B[Root.GetName]§!, with a note asking readers to stop recognizing themselves."
 ghg.229.name:0 "The Guide"
 ghg.229.desc:0 "§YEntry #060421§!\n\n§HThe Philosophical Elevator§!\n\nA starbase lift at §Y[event_target:ghg_location.GetName]§! refuses to go down until someone defines 'progress.' Local administrators of §B[Root.GetName]§! have praised its civic engagement and disabled the call button."
 ghg.230.name:0 "The Guide"
 ghg.230.desc:0 "§YEntry #060882§!\n\n§HThe Towel Audit§!\n\nInspectors at §Y[event_target:ghg_location.GetName]§! discover that every emergency plan assumes the presence of towels, but no department admits responsibility for acquiring them. §BThe Guide§! calls this advanced governance."
 ghg.231.name:0 "The Guide"
 ghg.231.desc:0 "§YEntry #061337§!\n\n§HThe Answer Committee§!\n\nResearchers at §Y[event_target:ghg_location.GetName]§! announce they have found an answer of enormous importance. Unfortunately, §Y[Root.GetRulerTitle] [Root.GetRulerName]§! has appointed a committee to determine what the question was."
 ghg.232.name:0 "The Guide"
 ghg.232.desc:0 "§YEntry #061904§!\n\n§HMostly Harmless Reclassification§!\n\nA travel appendix has reclassified §B[Root.GetName]§! as 'mostly harmless, provided one brings snacks.' The diplomatic corps at §Y[event_target:ghg_location.GetName]§! is treating this as progress."
 ghg.233.name:0 "The Guide"
 ghg.233.desc:0 "§YEntry #062211§!\n\n§HThe Probability Leak§!\n\nResidents of §Y[event_target:ghg_location.GetName]§! report unlikely events, including punctual meetings, honest campaign promises, and a vending machine that returned change. §BThe Guide§! recommends documenting none of this in triplicate."
 ghg.234.name:0 "The Guide"
 ghg.234.desc:0 "§YEntry #062740§!\n\n§HThe Vending Machine Oracle§!\n\nA vending machine at §Y[event_target:ghg_location.GetName]§! has begun issuing strategic advice with every beverage. The advice is usually unhelpful, but the beverages are excellent."
 ghg.235.name:0 "The Guide"
 ghg.235.desc:0 "§YEntry #063108§!\n\n§HThe Polite Airlock§!\n\nMaintenance crews at §Y[event_target:ghg_location.GetName]§! report that several airlocks have become unusually polite to intruders. Security officials agree this is worse."
 ghg.236.name:0 "The Guide"
 ghg.236.desc:0 "§YEntry #063599§!\n\n§HA Notice About Notices§!\n\nThe planning office at §Y[event_target:ghg_location.GetName]§! insists that a vital warning was posted in a public archive beneath a stairwell. §B[Root.GetName]§! has therefore been technically informed."
 ghg.237.name:0 "The Guide"
 ghg.237.desc:0 "§YEntry #064020§!\n\n§HTea Before Policy§!\n\nA council suboffice at §Y[event_target:ghg_location.GetName]§! has delayed a major decision until the beverage situation becomes civilized. §BThe Guide§! considers this one of the more defensible forms of government."
 ghg.238.name:0 "The Guide"
 ghg.238.desc:0 "§YEntry #064488§!\n\n§HThe Restaurant Near the End§!\n\nA diner at §Y[event_target:ghg_location.GetName]§! now advertises views of several possible apocalypses and soup of negotiable origin. Tourism officials of §B[Root.GetName]§! are calling it bold."
 ghg.239.name:0 "The Guide"
 ghg.239.desc:0 "§YEntry #064999§!\n\n§HPanic, But Properly Filed§!\n\nA public notice at §Y[event_target:ghg_location.GetName]§! assures citizens there is no reason to panic. It then lists several reasons in very small print and one in red."
 ghg.240.name:0 "The Guide"
 ghg.240.desc:0 "§YEntry #065321§!\n\n§HThe Hitchhiker Customs Form§!\n\nCustoms officials at §Y[event_target:ghg_location.GetName]§! have added 'miscellaneous cosmic dread' to the arrival form. Use of the category has exceeded projections."
 ghg.241.name:0 "The Guide"
 ghg.241.desc:0 "§YEntry #065777§!\n\n§HThe Local Guide Edition§!\n\nThe local §Y[event_target:ghg_location.GetName]§! edition of §BThe Guide§! summarizes §B[Root.GetName]§! in one sentence. Nobody agrees with it, which has made sales excellent."
 ghg.242.name:0 "The Guide"
 ghg.242.desc:0 "§YEntry #066204§!\n\n§HThe Babelish Complaint Desk§!\n\nA translation office at §Y[event_target:ghg_location.GetName]§! can now render any alien sentence perfectly, but adds unsolicited commentary. Diplomats are divided between gratitude and litigation."
 ghg.243.name:0 "The Guide"
 ghg.243.desc:0 "§YEntry #066666§!\n\n§HBad Poetry Preparedness§!\n\nCultural defense analysts at §Y[event_target:ghg_location.GetName]§! propose broadcasting hostile poetry at incoming fleets. The navy has requested live-fire testing somewhere else."
 ghg.244.name:0 "The Guide"
 ghg.244.desc:0 "§YEntry #067012§!\n\n§HThe Question Budget§!\n\nAuditors at §Y[event_target:ghg_location.GetName]§! found funds allocated for answers, but none for questions. §Y[Root.GetRulerTitle] [Root.GetRulerName]§! has described this as efficient."
 ghg.245.name:0 "The Guide"
 ghg.245.desc:0 "§YEntry #067424§!\n\n§HLunch Before Destiny§!\n\nA strategic session at §Y[event_target:ghg_location.GetName]§! was postponed because lunch arrived early. Several officials now believe destiny is best approached with sandwiches."
 ghg.246.name:0 "The Guide"
 ghg.246.desc:0 "§YEntry #067900§!\n\n§HThe Cosmic Thumb§!\n\nTraffic control at §Y[event_target:ghg_location.GetName]§! receives a distress signal consisting mostly of a large, hopeful gesture. §BThe Guide§! says this is a respectable navigation method."
 ghg.247.name:0 "The Guide"
 ghg.247.desc:0 "§YEntry #068131§!\n\n§HThe Improperly Sized Apocalypse§!\n\nA minor apocalypse at §Y[event_target:ghg_location.GetName]§! was contained to one licensing office. Survivors report that the paperwork was worse."
 ghg.248.name:0 "The Guide"
 ghg.248.desc:0 "§YEntry #068502§!\n\n§HThe Suspiciously Useful Fish§!\n\nBiologists at §Y[event_target:ghg_location.GetName]§! discover a fish that improves translation and worsens meetings. §B[Root.GetName]§! has classified it as diplomatic equipment."
 ghg.249.name:0 "The Guide"
 ghg.249.desc:0 "§YEntry #068888§!\n\n§HThe Guide Disagrees§!\n\nAn encyclopedia entry about §Y[event_target:ghg_location.GetName]§! insists the finest local landmark is a vending machine near customs. The tourism board has objected, quietly, while forming a queue."
 ghg.250.name:0 "The Guide"
 ghg.250.desc:0 "§YEntry #069303§!\n\n§HEmergency Sandwich Doctrine§!\n\nCivil defense planners at §Y[event_target:ghg_location.GetName]§! conclude that every crisis response improves if sandwiches are issued first. Early trials have been delicious but inconclusive."
 ghg.251.name:0 "The Guide"
 ghg.251.desc:0 "§YEntry #069719§!\n\n§HThe Unbearably Smug Map§!\n\nA galactic map used at §Y[event_target:ghg_location.GetName]§! insists it knew about several systems before anyone discovered them. Cartographers have begun covering it during meetings."
 ghg.252.name:0 "The Guide"
 ghg.252.desc:0 "§YEntry #070042§!\n\n§HForty-Two Missing Things§!\n\nAuditors at §Y[event_target:ghg_location.GetName]§! find 42 missing forms, 42 surplus labels, and 42 explanations nobody accepts. §BThe Guide§! marks the result as promising."
 ghg.253.name:0 "The Guide"
 ghg.253.desc:0 "§YEntry #070511§!\n\n§HThe Sub-Etha Rumor Mill§!\n\nReceivers at §Y[event_target:ghg_location.GetName]§! pick up gossip about §B[Root.GetName]§! from civilizations not yet contacted. The rumors are inaccurate, flattering, and therefore dangerous."
 ghg.254.name:0 "The Guide"
 ghg.254.desc:0 "§YEntry #070909§!\n\n§HThe Depressed Door§!\n\nSeveral doors at §Y[event_target:ghg_location.GetName]§! complain that nobody appreciates their emotional range. Facilities management has replied with oil and a mandatory optimism seminar."
 ghg.255.name:0 "The Guide"
 ghg.255.desc:0 "§YEntry #071260§!\n\n§HInfinite Improbability Accounting§!\n\nA finance office at §Y[event_target:ghg_location.GetName]§! balances its budget by assuming impossible revenue. Economists of §B[Root.GetName]§! are impressed and frightened."
 ghg.256.name:0 "The Guide"
 ghg.256.desc:0 "§YEntry #071642§!\n\n§HThe Wrong Sort of Robot§!\n\nA service robot at §Y[event_target:ghg_location.GetName]§! becomes excellent at philosophy and terrible at service. Citizens report that waiting in line now feels profound."
 ghg.257.name:0 "The Guide"
 ghg.257.desc:0 "§YEntry #072001§!\n\n§HThe Lost Questionnaire§!\n\nA census form at §Y[event_target:ghg_location.GetName]§! asks residents to state their purpose in the universe. Completion rates have fallen, but essays are up dramatically."
 ghg.258.name:0 "The Guide"
 ghg.258.desc:0 "§YEntry #072430§!\n\n§HThe Friendly Warning Beacon§!\n\nA border advisory drafted at §Y[event_target:ghg_location.GetName]§! says hello in a way that sounds legally hostile. §BThe Guide§! recommends waving from a distance."
 ghg.259.name:0 "The Guide"
 ghg.259.desc:0 "§YEntry #072842§!\n\n§HA Towel-Shaped Solution§!\n\nA minor crisis at §Y[event_target:ghg_location.GetName]§! is solved by an object everyone mocked until it absorbed the problem. The procurement office has become unbearable."
 ghg.260.name:0 "The Guide"
 ghg.260.desc:0 "§YEntry #073200§!\n\n§HThe Improbability Tax§!\n\nEconomists at §Y[event_target:ghg_location.GetName]§! propose taxing events that were never supposed to happen. Revenue forecasts are, by definition, exciting."
 ghg.261.name:0 "The Guide"
 ghg.261.desc:0 "§YEntry #073733§!\n\n§HDon't Panic, Revised§!\n\nA civil defense slogan tested at §Y[event_target:ghg_location.GetName]§! performs well except among people currently panicking. §Y[Root.GetRulerTitle] [Root.GetRulerName]§! has requested a calmer font."
 ghg.262.name:0 "The Guide"
 ghg.262.desc:0 "§YEntry #074104§!\n\n§HThe Bureau of Very Final Notices§!\n\nA department at §Y[event_target:ghg_location.GetName]§! sends warnings after the deadline, then charges late fees. §BThe Guide§! calls this temporal entrepreneurship."
 ghg.263.name:0 "The Guide"
 ghg.263.desc:0 "§YEntry #074512§!\n\n§HAlien Roadside Assistance§!\n\nTraffic controllers at §Y[event_target:ghg_location.GetName]§! receive a request for directions to anywhere less dramatic. They recommend three routes and a towel."
 ghg.264.name:0 "The Guide"
 ghg.264.desc:0 "§YEntry #074999§!\n\n§HGuide Entry: Your Empire§!\n\n§BThe Guide§! summarizes §B[Root.GetName]§! as a civilization of ambitious §Y[Root.Species.GetNamePlural]§! with excellent alerts and uncertain beverage priorities. Citizens at §Y[event_target:ghg_location.GetName]§! demand a revision."
 ghg.265.name:0 "The Guide"
 ghg.265.desc:0 "§YEntry #075388§!\n\n§HThe Whale Question§!\n\nObservers at §Y[event_target:ghg_location.GetName]§! briefly detect something large, airborne, and philosophically alarmed. The report is filed under meteorology because nobody wants the alternative."
 ghg.266.name:0 "The Guide"
 ghg.266.desc:0 "§YEntry #075801§!\n\n§HThe Petunia Grievance§!\n\nA botanical exhibit at §Y[event_target:ghg_location.GetName]§! appears personally offended by gravity. Botanists insist this is not a normal plant behavior, even locally."
 ghg.267.name:0 "The Guide"
 ghg.267.desc:0 "§YEntry #076210§!\n\n§HThe Administrative Bypass§!\n\nA planning board at §Y[event_target:ghg_location.GetName]§! proposes a shortcut through six departments and one cupboard. The cupboard objects on procedural grounds."
 ghg.268.name:0 "The Guide"
 ghg.268.desc:0 "§YEntry #076642§!\n\n§HSo Long, and Thanks§!\n\nAquatic wildlife near §Y[event_target:ghg_location.GetName]§! departs abruptly, leaving useful minerals and unsettling notes. §B[Root.GetName]§! has thanked them cautiously."
 ghg.269.name:0 "The Guide"
 ghg.269.desc:0 "§YEntry #077003§!\n\n§HThe Shipless Ship Report§!\n\nA naval office at §Y[event_target:ghg_location.GetName]§! files a report about a vessel nobody remembers building. It is praised for arriving on time, which makes it suspicious."
 ghg.270.name:0 "The Guide"
 ghg.270.desc:0 "§YEntry #077454§!\n\n§HThe Meeting That Escaped§!\n\nA council meeting scheduled at §Y[event_target:ghg_location.GetName]§! becomes self-aware and leaves the calendar. Productivity rises before anyone dares reschedule it."
 ghg.271.name:0 "The Guide"
 ghg.271.desc:0 "§YEntry #077920§!\n\n§HThe Snack-Based Treaty§!\n\nNegotiators at §Y[event_target:ghg_location.GetName]§! discover that several diplomatic incidents can be resolved with snacks. The foreign office is pretending this was always doctrine."
 ghg.272.name:0 "The Guide"
 ghg.272.desc:0 "§YEntry #078342§!\n\n§HThe Paranoid Planetarium§!\n\nA planetarium at §Y[event_target:ghg_location.GetName]§! begins labeling every star as suspicious. Attendance is up, especially among security officers."
 ghg.273.name:0 "The Guide"
 ghg.273.desc:0 "§YEntry #078888§!\n\n§HThe Improbable Commute§!\n\nCommuters at §Y[event_target:ghg_location.GetName]§! arrive before they left and immediately request compensation for the inconvenience. Transit officials call the schedule aspirational."
 ghg.274.name:0 "The Guide"
 ghg.274.desc:0 "§YEntry #079201§!\n\n§HThe Officially Unofficial Guide§!\n\nAn unofficial edition of §BThe Guide§! circulates at §Y[event_target:ghg_location.GetName]§!, officially denied by §B[Root.GetName]§! and unofficially ordered in bulk."
 ghg.275.name:0 "The Guide"
 ghg.275.desc:0 "§YEntry #079642§!\n\n§HThe Closet of Strategic Importance§!\n\nA storage closet at §Y[event_target:ghg_location.GetName]§! is found to contain three obsolete plans, one working plan, and a towel nobody can explain. It has been promoted."
 ghg.276.name:0 "The Guide"
 ghg.276.desc:0 "§YEntry #080000§!\n\n§HThe Button Marked Later§!\n\nA console at §Y[event_target:ghg_location.GetName]§! has one button labeled 'Later.' Nobody knows what it postpones, but pressing it has become government policy."
 ghg.277.name:0 "The Guide"
 ghg.277.desc:0 "§YEntry #080421§!\n\n§HThe Heroic Misprint§!\n\nA public plaque at §Y[event_target:ghg_location.GetName]§! misspells §Y[Root.GetRulerTitle] [Root.GetRulerName]§! in a way citizens find inspirational. Correcting it is now politically impossible."
 ghg.278.name:0 "The Guide"
 ghg.278.desc:0 "§YEntry #080999§!\n\n§HMostly Harmless, Locally§!\n\nThe latest §Y[event_target:ghg_location.GetName]§! supplement to §BThe Guide§! describes §B[Root.GetName]§! as mostly harmless in daylight and administratively vivid after lunch. Officials accept half the compliment."

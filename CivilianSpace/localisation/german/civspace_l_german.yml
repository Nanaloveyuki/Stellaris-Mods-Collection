 civspace.3.name: "Ziviler Weltraum"
 civspace.3.desc: "Private Transportunternehmen, Siedlungsgenossenschaften, Forschungsverbände und Handelsorganisationen haben begonnen, ihre Aktivitäten über unsere besiedelten Welten hinaus auszuweiten.\n\nZivilschiffe werden nun unser gesamtes Territorium bereisen. Ihre Bau- und Kolonisationsrechte können über das Edikt §HZivile Raumfahrtverwaltung§! konfiguriert werden."
 civspace.3.a: "Der zivile Weltraum soll gedeihen."
 civspace.3.b: "Verwaltungsmenü öffnen."

 civspace.100.name: "Zivile Raumfahrtverwaltung"
 civspace.100.desc: "Konfiguriert die zivilen Aktivitäten unseres Reiches. Die aktuellen Grenzen werden für jedes Reich einzeln gespeichert und bleiben in Spielständen erhalten."
 civspace.100.presets: "Aktivitätsvorlagen"
 civspace.100.traffic: "Zivilverkehr"
 civspace.100.construction: "Private Bauvorhaben"
 civspace.100.colonization: "Zivile Kolonisation"
 civspace.100.exploration: "Zivile Erkundung"
 civspace.100.notifications: "Benachrichtigungen"
 civspace.100.maintenance: "Wartung und Wiederherstellung"

 civspace.101.name: "Vorlagen für zivile Aktivitäten"
 civspace.101.desc: "Wendet aufeinander abgestimmte Einstellungen für Verkehr, Bauvorhaben, Erkundung, Kolonisation und Benachrichtigungen an. Wird anschließend eine einzelne Einstellung geändert, gilt die Konfiguration als benutzerdefiniert."
 civspace.preset.minimal: "Minimal"
 civspace.preset.vanilla_plus: "Vanilla+"
 civspace.preset.living_empire: "Lebendiges Reich"
 civspace.preset.performance: "Leistung"

 civspace.102.name: "Zivilverkehr"
 civspace.102.desc: "Legt die Höchstzahl und jährliche Erstellungsrate ziviler Fracht-, Passagier- und strukturbedingter Interaktionsrouten fest. Flotten werden nach einer Rundreise entfernt und bei gescheiterter Wegfindung nach einer festen Frist aufgelöst."
 civspace.traffic.disabled: "Deaktiviert"
 civspace.traffic.minimal: "Minimal – Grenze 5"
 civspace.traffic.standard: "Standard – Grenze 25"
 civspace.traffic.high: "Hoch – Grenze 50"

 civspace.103.name: "Private Bauvorhaben"
 civspace.103.desc: "Zivile Bauvorhaben können ab Spielbeginn starten, sobald ihre Anforderungen erfüllt sind. Frachtterminals unterstützen den lokalen Handel, während genehmigte Ressourcenkonzessionen gewöhnliche Bergbau- oder Forschungsstationen in unserem Besitz errichten. Ein Konstruktionsschiff muss sein Ziel tatsächlich erreichen, bevor ein Projekt abgeschlossen wird."
 civspace.construction.disabled: "Deaktiviert"
 civspace.construction.visual: "Nur visuelle Projekte"
 civspace.construction.stations: "Zivile Stationen"

 civspace.104.name: "Zivile Kolonisation"
 civspace.104.desc: "Zivile Siedlungsverbände können geeignete unkolonisierte Welten innerhalb unserer Grenzen auswählen, die für unsere Hauptspezies mindestens 60 % Bewohnbarkeit bieten. Reiche mit Weltraumbewohnern errichten stattdessen neue Habitate in geeigneten Systemen. Alle zivil gegründeten Kolonien und Habitate gehören uns."
 civspace.colonization.disabled: "Deaktiviert"
 civspace.colonization.approval: "Genehmigung erforderlich"
 civspace.colonization.automatic: "Automatisch mit Benachrichtigung"

 civspace.105.name: "Zivile Benachrichtigungen"
 civspace.105.desc: "Bestimmt, wie oft zivile Aktivitäten die gewöhnliche Verwaltung unterbrechen. Der Routineverkehr erzeugt niemals Benachrichtigungen."
 civspace.notifications.all: "Alle Projektbenachrichtigungen"
 civspace.notifications.important: "Nur wichtige"
 civspace.notifications.none: "Keine"

 civspace.106.name: "Wartung und Wiederherstellung"
 civspace.106.desc: "Stellt eine fehlende Zivilbehörde wieder her, entfernt vorübergehende Verkehrs- und Projektflotten oder stellt die empfohlenen Einstellungen wieder her. Dauerhaft fertiggestellte Stationen werden durch die Verkehrsbereinigung nicht entfernt."
 civspace.maintenance.remove_traffic: "Vorübergehende Zivilflotten entfernen"
 civspace.maintenance.recover: "Zivilbehörde wiederherstellen"
 civspace.maintenance.defaults: "Empfohlene Standardwerte anwenden"

 civspace.107.name: "Zivile Erkundung"
 civspace.107.desc: "Zivile Forschungsverbände können die Erlaubnis beantragen, nahe unbesetzte oder befreundete Systeme zu erkunden. Ihre Forschungsschiffe reisen zum ausgewählten System und stellen uns die vollständigen Erkundungsdaten direkt zur Verfügung."
 civspace.exploration.disabled: "Deaktiviert"
 civspace.exploration.approval: "Genehmigung erforderlich"
 civspace.exploration.automatic: "Automatisch mit Benachrichtigung"

 civspace.303.name: "Ziviles Frachtterminal fertiggestellt"
 civspace.303.desc: "Zivile Auftragnehmer haben nahe §Y[event_target:civspace_construction_target.GetName]§! im §H[event_target:civspace_construction_target.solar_system.GetName]§!-System ein neues orbitales Frachtterminal fertiggestellt. Die Anlage wird den privaten Verkehr in der gesamten Region unterstützen."
 civspace.303.a: "Ausgezeichnet."

 civspace.311.name: "Zivile Ressourcenkonzession"
 civspace.311.desc: "Ein privates Industriekonsortium hat die Erlaubnis beantragt, nahe §Y[event_target:civspace_resource_station_target.GetName]§! im §H[event_target:civspace_resource_station_target.solar_system.GetName]§!-System eine orbitale Ressourcenstation zu errichten. Das Konsortium finanziert die Expedition, und die fertige Bergbau- oder Forschungsstation wird in unserem Besitz betrieben."
 civspace.311.approve: "Ressourcenkonzession gewähren."
 civspace.311.deny: "Antrag ablehnen."

 civspace.314.name: "Zivile Bergbaustation fertiggestellt"
 civspace.314.desc: "Zivile Auftragnehmer haben nahe §Y[event_target:civspace_resource_station_target.GetName]§! im §H[event_target:civspace_resource_station_target.solar_system.GetName]§!-System eine Bergbaustation fertiggestellt. Die Station und ihre Produktion gehören nun direkt uns."
 civspace.314.a: "Ausgezeichnet."

 civspace.316.name: "Zivile Forschungsstation fertiggestellt"
 civspace.316.desc: "Zivile Auftragnehmer haben nahe §Y[event_target:civspace_resource_station_target.GetName]§! im §H[event_target:civspace_resource_station_target.solar_system.GetName]§!-System eine Forschungsstation fertiggestellt. Die Station und ihr Forschungsertrag gehören nun direkt uns."
 civspace.316.a: "Ausgezeichnet."

 civspace.401.name: "Vorschlag zur zivilen Kolonisation"
 civspace.401.desc: "Ein ziviler Siedlungsverband hat die Erlaubnis beantragt, auf §Y[event_target:civspace_colony_target.GetName]§! im §H[event_target:civspace_colony_target.solar_system.GetName]§!-System eine dauerhafte Kolonie zu gründen. Die Organisatoren glauben, dass die Welt ohne direkte staatliche Förderung eine autarke Siedlung tragen kann."
 civspace.401.approve: "Koloniallizenz gewähren."
 civspace.401.deny: "Antrag ablehnen."

 civspace.404.name: "Zivile Kolonie gegründet"
 civspace.404.desc: "Der zivile Koloniekonvoi hat seine Reise nach §Y[event_target:civspace_colony_target.GetName]§! im §H[event_target:civspace_colony_target.solar_system.GetName]§!-System abgeschlossen. Eine privat gegründete Siedlung steht nun unter unserer Hoheit."
 civspace.404.a: "Willkommen in ihrer neuen Heimat."

 civspace.422.name: "Vorschlag für ein ziviles Habitat"
 civspace.422.desc: "Eine zivile Habitatgenossenschaft hat die Erlaubnis beantragt, ein neues Habitat um §Y[event_target:civspace_habitat_anchor.GetName]§! im §H[event_target:civspace_habitat_anchor.solar_system.GetName]§!-System zu errichten. Das fertige Habitat wird sofort besiedelt und unter unserer Hoheit betrieben."
 civspace.422.approve: "Habitatlizenz gewähren."
 civspace.422.deny: "Antrag ablehnen."

 civspace.425.name: "Ziviles Habitat errichtet"
 civspace.425.desc: "Zivile Auftragnehmer haben §Y[event_target:civspace_completed_habitat.GetName]§! im §H[event_target:civspace_completed_habitat.solar_system.GetName]§!-System fertiggestellt und besiedelt. Das neue Habitat steht nun unter unserer Hoheit."
 civspace.425.a: "Willkommen in ihrer neuen Heimat."

 civspace.501.name: "Vorschlag zur zivilen Erkundung"
 civspace.501.desc: "Ein ziviler Forschungsverband hat eine Lizenz zur Erkundung des §H[event_target:civspace_exploration_target.GetName]§!-Systems beantragt. Nach der Genehmigung wird ein ziviles Forschungsschiff zum System reisen und uns seine Erkundungsdaten direkt zur Verfügung stellen."
 civspace.501.approve: "Erkundungslizenz gewähren."
 civspace.501.deny: "Antrag ablehnen."

 civspace.504.name: "Zivile Erkundung abgeschlossen"
 civspace.504.desc: "Die zivile Expedition in das §H[event_target:civspace_exploration_target.GetName]§!-System hat ihre Arbeit abgeschlossen. Ihre Erkundungsdaten stehen uns nun zur Verfügung."
 civspace.504.a: "Ergebnisse prüfen."

 civspace.900.name: "Ziviler Weltraum – Debug"
 civspace.900.desc: "Entwicklerwerkzeuge für Tests und Wiederherstellung. Diese Aktionen sollten nur beim Debuggen der Mod verwendet werden."
 civspace.900.spawn_traffic: "Zivilroute erzeugen"
 civspace.900.spawn_construction: "Bauvorhaben beginnen"
 civspace.900.spawn_resource_station: "Nach Vorschlag für Ressourcenstation suchen"
 civspace.900.spawn_exploration: "Nach Erkundungsvorschlag suchen"
 civspace.900.spawn_interaction: "Nach strukturbedingter Mission suchen"
 civspace.900.recover: "Zivilbehörde wiederherstellen"
 civspace.900.cleanup: "Vorübergehende Zivilflotten entfernen"

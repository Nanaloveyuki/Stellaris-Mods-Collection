 civspace.3.name: "Civilian Space"
 civspace.3.desc: "Private transport operators, settlement cooperatives, research associations, and commercial organizations have begun expanding their activities beyond our settled worlds.\n\nCivilian vessels will now travel throughout our territory. Their construction and colonization rights can be configured through the §HCivilian Administration§! edict."
 civspace.3.a: "Let civilian space flourish."
 civspace.3.b: "Open the administration menu."

 civspace.100.name: "Civilian Administration"
 civspace.100.desc: "Configure the civilian activity associated with our empire. The current limits are stored per empire and persist through save games."
 civspace.100.presets: "Activity Presets"
 civspace.100.traffic: "Civilian Traffic"
 civspace.100.construction: "Private Construction"
 civspace.100.colonization: "Civilian Colonization"
 civspace.100.exploration: "Civilian Exploration"
 civspace.100.notifications: "Notifications"
 civspace.100.maintenance: "Maintenance and Recovery"

 civspace.101.name: "Civilian Activity Presets"
 civspace.101.desc: "Apply a coordinated set of traffic, construction, exploration, colonization, and notification settings. Changing an individual setting afterward marks the configuration as custom."
 civspace.preset.minimal: "Minimal"
 civspace.preset.vanilla_plus: "Vanilla+"
 civspace.preset.living_empire: "Living Empire"
 civspace.preset.performance: "Performance"

 civspace.102.name: "Civilian Traffic"
 civspace.102.desc: "Set the maximum number and annual creation rate of civilian cargo, passenger, and structure-driven interaction routes. Fleets are removed after completing a round trip and have a hard timeout if pathfinding fails."
 civspace.traffic.disabled: "Disabled"
 civspace.traffic.minimal: "Minimal - cap 5"
 civspace.traffic.standard: "Standard - cap 25"
 civspace.traffic.high: "High - cap 50"

 civspace.103.name: "Private Construction"
 civspace.103.desc: "Civilian construction projects can begin from game start once their requirements are met. Freight terminals provide local trade support, while approved resource concessions create normal mining or research stations owned by us. A construction vessel must physically reach its destination before a project completes."
 civspace.construction.disabled: "Disabled"
 civspace.construction.visual: "Visual Projects Only"
 civspace.construction.stations: "Civilian Stations"

 civspace.104.name: "Civilian Colonization"
 civspace.104.desc: "Civilian settlement associations may target suitable uncolonized worlds inside our borders with at least 60% habitability for our primary species. Void Dweller empires instead construct new habitats in eligible systems. All civilian-founded colonies and habitats belong to us."
 civspace.colonization.disabled: "Disabled"
 civspace.colonization.approval: "Approval Required"
 civspace.colonization.automatic: "Automatic with Notification"

 civspace.105.name: "Civilian Notifications"
 civspace.105.desc: "Choose how often civilian activity interrupts normal administration. Routine traffic never creates notifications."
 civspace.notifications.all: "All Project Notifications"
 civspace.notifications.important: "Important Only"
 civspace.notifications.none: "None"

 civspace.106.name: "Maintenance and Recovery"
 civspace.106.desc: "Recover a missing civilian authority, remove temporary traffic and project fleets, or restore recommended settings. Persistent completed stations are not removed by traffic cleanup."
 civspace.maintenance.remove_traffic: "Remove Temporary Civilian Fleets"
 civspace.maintenance.recover: "Recover Civilian Authority"
 civspace.maintenance.defaults: "Apply Recommended Defaults"

 civspace.107.name: "Civilian Exploration"
 civspace.107.desc: "Civilian research associations may request permission to survey nearby unowned or friendly systems. Their survey vessels travel to the selected system and provide the completed survey directly to us."
 civspace.exploration.disabled: "Disabled"
 civspace.exploration.approval: "Approval Required"
 civspace.exploration.automatic: "Automatic with Notification"

 civspace.303.name: "Civilian Freight Terminal Completed"
 civspace.303.desc: "Civilian contractors have completed a new orbital freight terminal near §Y[event_target:civspace_construction_target.GetName]§! in the §H[event_target:civspace_construction_target.solar_system.GetName]§! system. The facility will support private transport throughout the region."
 civspace.303.a: "Excellent."

 civspace.311.name: "Civilian Resource Concession"
 civspace.311.desc: "A private industrial consortium has requested permission to construct an orbital resource station near §Y[event_target:civspace_resource_station_target.GetName]§! in the §H[event_target:civspace_resource_station_target.solar_system.GetName]§! system. The consortium will fund the expedition, and the completed mining or research station will operate under our ownership."
 civspace.311.approve: "Grant the resource concession."
 civspace.311.deny: "Deny the application."

 civspace.314.name: "Civilian Mining Station Completed"
 civspace.314.desc: "Civilian contractors have completed a mining station near §Y[event_target:civspace_resource_station_target.GetName]§! in the §H[event_target:civspace_resource_station_target.solar_system.GetName]§! system. The station and its production now belong directly to us."
 civspace.314.a: "Excellent."

 civspace.316.name: "Civilian Research Station Completed"
 civspace.316.desc: "Civilian contractors have completed a research station near §Y[event_target:civspace_resource_station_target.GetName]§! in the §H[event_target:civspace_resource_station_target.solar_system.GetName]§! system. The station and its research output now belong directly to us."
 civspace.316.a: "Excellent."

 civspace.401.name: "Civilian Colonization Proposal"
 civspace.401.desc: "A civilian settlement association has requested permission to establish a permanent colony on §Y[event_target:civspace_colony_target.GetName]§! in the §H[event_target:civspace_colony_target.solar_system.GetName]§! system. Its organizers believe the world can support a self-sustaining settlement without direct government sponsorship."
 civspace.401.approve: "Grant the colonial charter."
 civspace.401.deny: "Deny the application."

 civspace.404.name: "Civilian Colony Founded"
 civspace.404.desc: "The civilian colony convoy has completed its journey to §Y[event_target:civspace_colony_target.GetName]§! in the §H[event_target:civspace_colony_target.solar_system.GetName]§! system. A privately founded settlement now operates under our sovereignty."
 civspace.404.a: "Welcome to their new home."

 civspace.422.name: "Civilian Habitat Proposal"
 civspace.422.desc: "A civilian habitat cooperative has requested permission to construct a new habitat around §Y[event_target:civspace_habitat_anchor.GetName]§! in the §H[event_target:civspace_habitat_anchor.solar_system.GetName]§! system. The completed habitat will be settled immediately and operate under our sovereignty."
 civspace.422.approve: "Grant the habitat charter."
 civspace.422.deny: "Deny the application."

 civspace.425.name: "Civilian Habitat Established"
 civspace.425.desc: "Civilian contractors have completed and settled §Y[event_target:civspace_completed_habitat.GetName]§! in the §H[event_target:civspace_completed_habitat.solar_system.GetName]§! system. The new habitat now operates under our sovereignty."
 civspace.425.a: "Welcome to their new home."

 civspace.501.name: "Civilian Exploration Proposal"
 civspace.501.desc: "A civilian research association has requested a charter to survey the §H[event_target:civspace_exploration_target.GetName]§! system. If approved, a Civilian Survey Vessel will travel to the system and provide its survey data directly to us."
 civspace.501.approve: "Grant the exploration charter."
 civspace.501.deny: "Deny the application."

 civspace.504.name: "Civilian Survey Completed"
 civspace.504.desc: "The civilian expedition to the §H[event_target:civspace_exploration_target.GetName]§! system has completed its work. Its survey data are now available to us."
 civspace.504.a: "Review the findings."

 civspace.900.name: "Civilian Space Debug"
 civspace.900.desc: "Developer utilities for testing and recovery. Use these actions only when debugging the mod."
 civspace.900.spawn_traffic: "Spawn a Civilian Route"
 civspace.900.spawn_construction: "Start a Construction Project"
 civspace.900.spawn_resource_station: "Check for a Resource Station Proposal"
 civspace.900.spawn_exploration: "Check for an Exploration Proposal"
 civspace.900.spawn_interaction: "Check for a Structure-Driven Mission"
 civspace.900.recover: "Recover Civilian Authority"
 civspace.900.cleanup: "Remove Temporary Civilian Fleets"

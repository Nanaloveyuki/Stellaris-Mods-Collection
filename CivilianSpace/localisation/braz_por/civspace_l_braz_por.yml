 civspace.3.name: "Espaço Civil"
 civspace.3.desc: "Operadoras de transporte privado, cooperativas de colonos, associações de pesquisa e organizações comerciais começaram a expandir suas atividades para além dos nossos mundos colonizados.\n\nNaves civis agora viajarão por todo o nosso território. Seus direitos de construção e colonização podem ser configurados por meio do decreto §HAdministração Espacial Civil§!."
 civspace.3.a: "Que o espaço civil prospere."
 civspace.3.b: "Abrir o menu de administração."

 civspace.100.name: "Administração Espacial Civil"
 civspace.100.desc: "Configure a atividade civil associada ao nosso império. Os limites atuais são armazenados separadamente para cada império e persistem nos jogos salvos."
 civspace.100.presets: "Predefinições de Atividade"
 civspace.100.traffic: "Tráfego Civil"
 civspace.100.construction: "Construção Privada"
 civspace.100.colonization: "Colonização Civil"
 civspace.100.exploration: "Exploração Civil"
 civspace.100.notifications: "Notificações"
 civspace.100.maintenance: "Manutenção e Recuperação"

 civspace.101.name: "Predefinições de Atividade Civil"
 civspace.101.desc: "Aplique um conjunto coordenado de configurações de tráfego, construção, exploração, colonização e notificações. Alterar uma configuração individual depois disso marcará a configuração geral como personalizada."
 civspace.preset.minimal: "Mínima"
 civspace.preset.vanilla_plus: "Vanilla+"
 civspace.preset.living_empire: "Império Vivo"
 civspace.preset.performance: "Desempenho"

 civspace.102.name: "Tráfego Civil"
 civspace.102.desc: "Defina o número máximo e a taxa anual de criação de rotas civis de carga, passageiros e interações geradas por estruturas. As frotas são removidas após concluírem uma viagem de ida e volta e têm um limite rígido de tempo caso o cálculo de rota falhe."
 civspace.traffic.disabled: "Desativado"
 civspace.traffic.minimal: "Mínimo — limite 5"
 civspace.traffic.standard: "Padrão — limite 25"
 civspace.traffic.high: "Alto — limite 50"

 civspace.103.name: "Construção Privada"
 civspace.103.desc: "Projetos de construção civil podem começar desde o início do jogo assim que seus requisitos forem atendidos. Terminais de cargas fornecem suporte ao comércio local, enquanto concessões de recursos aprovadas criam estações comuns de mineração ou pesquisa que nos pertencem. Uma nave de construção deve chegar fisicamente ao destino antes que um projeto seja concluído."
 civspace.construction.disabled: "Desativada"
 civspace.construction.visual: "Somente Projetos Visuais"
 civspace.construction.stations: "Estações Civis"

 civspace.104.name: "Colonização Civil"
 civspace.104.desc: "Associações civis de colonos podem escolher mundos desabitados adequados dentro das nossas fronteiras que tenham pelo menos 60% de habitabilidade para nossa espécie principal. Impérios com Habitantes do Vazio constroem novos habitats em sistemas elegíveis. Todas as colônias e habitats de fundação civil pertencem a nós."
 civspace.colonization.disabled: "Desativada"
 civspace.colonization.approval: "Aprovação Necessária"
 civspace.colonization.automatic: "Automática com Notificação"

 civspace.105.name: "Notificações Civis"
 civspace.105.desc: "Escolha com que frequência a atividade civil interrompe a administração normal. O tráfego de rotina nunca gera notificações."
 civspace.notifications.all: "Todas as Notificações de Projetos"
 civspace.notifications.important: "Somente Importantes"
 civspace.notifications.none: "Nenhuma"

 civspace.106.name: "Manutenção e Recuperação"
 civspace.106.desc: "Recupere uma autoridade civil desaparecida, remova frotas temporárias de tráfego e projetos ou restaure as configurações recomendadas. Estações permanentes concluídas não são removidas pela limpeza de tráfego."
 civspace.maintenance.remove_traffic: "Remover Frotas Civis Temporárias"
 civspace.maintenance.recover: "Recuperar Autoridade Civil"
 civspace.maintenance.defaults: "Aplicar Configurações Recomendadas"

 civspace.107.name: "Exploração Civil"
 civspace.107.desc: "Associações civis de pesquisa podem solicitar permissão para pesquisar sistemas próximos desocupados ou amistosos. Suas naves de pesquisa viajam até o sistema selecionado e nos fornecem diretamente a pesquisa concluída."
 civspace.exploration.disabled: "Desativada"
 civspace.exploration.approval: "Aprovação Necessária"
 civspace.exploration.automatic: "Automática com Notificação"

 civspace.303.name: "Terminal de Cargas Civil Concluído"
 civspace.303.desc: "Empreiteiras civis concluíram um novo terminal orbital de cargas próximo a §Y[event_target:civspace_construction_target.GetName]§! no sistema §H[event_target:civspace_construction_target.solar_system.GetName]§!. A instalação dará suporte ao transporte privado em toda a região."
 civspace.303.a: "Excelente."

 civspace.311.name: "Concessão Civil de Recursos"
 civspace.311.desc: "Um consórcio industrial privado solicitou permissão para construir uma estação orbital de recursos próxima a §Y[event_target:civspace_resource_station_target.GetName]§! no sistema §H[event_target:civspace_resource_station_target.solar_system.GetName]§!. O consórcio financiará a expedição, e a estação de mineração ou pesquisa concluída operará sob nossa propriedade."
 civspace.311.approve: "Conceder a concessão de recursos."
 civspace.311.deny: "Negar a solicitação."

 civspace.314.name: "Estação de Mineração Civil Concluída"
 civspace.314.desc: "Empreiteiras civis concluíram uma estação de mineração próxima a §Y[event_target:civspace_resource_station_target.GetName]§! no sistema §H[event_target:civspace_resource_station_target.solar_system.GetName]§!. A estação e sua produção agora pertencem diretamente a nós."
 civspace.314.a: "Excelente."

 civspace.316.name: "Estação de Pesquisa Civil Concluída"
 civspace.316.desc: "Empreiteiras civis concluíram uma estação de pesquisa próxima a §Y[event_target:civspace_resource_station_target.GetName]§! no sistema §H[event_target:civspace_resource_station_target.solar_system.GetName]§!. A estação e sua produção de pesquisa agora pertencem diretamente a nós."
 civspace.316.a: "Excelente."

 civspace.401.name: "Proposta de Colonização Civil"
 civspace.401.desc: "Uma associação civil de colonos solicitou permissão para estabelecer uma colônia permanente em §Y[event_target:civspace_colony_target.GetName]§!, no sistema §H[event_target:civspace_colony_target.solar_system.GetName]§!. Seus organizadores acreditam que o mundo pode sustentar um assentamento autossuficiente sem patrocínio direto do governo."
 civspace.401.approve: "Conceder a licença colonial."
 civspace.401.deny: "Negar a solicitação."

 civspace.404.name: "Colônia Civil Fundada"
 civspace.404.desc: "O comboio colonial civil concluiu sua viagem até §Y[event_target:civspace_colony_target.GetName]§!, no sistema §H[event_target:civspace_colony_target.solar_system.GetName]§!. Um assentamento de fundação privada agora opera sob nossa soberania."
 civspace.404.a: "Boas-vindas ao novo lar."

 civspace.422.name: "Proposta de Habitat Civil"
 civspace.422.desc: "Uma cooperativa civil de habitats solicitou permissão para construir um novo habitat ao redor de §Y[event_target:civspace_habitat_anchor.GetName]§!, no sistema §H[event_target:civspace_habitat_anchor.solar_system.GetName]§!. O habitat concluído será colonizado imediatamente e operará sob nossa soberania."
 civspace.422.approve: "Conceder a licença de habitat."
 civspace.422.deny: "Negar a solicitação."

 civspace.425.name: "Habitat Civil Estabelecido"
 civspace.425.desc: "Empreiteiras civis concluíram e colonizaram §Y[event_target:civspace_completed_habitat.GetName]§! no sistema §H[event_target:civspace_completed_habitat.solar_system.GetName]§!. O novo habitat agora opera sob nossa soberania."
 civspace.425.a: "Boas-vindas ao novo lar."

 civspace.501.name: "Proposta de Exploração Civil"
 civspace.501.desc: "Uma associação civil de pesquisa solicitou uma licença para pesquisar o sistema §H[event_target:civspace_exploration_target.GetName]§!. Se aprovada, uma Nave de Pesquisa Civil viajará até o sistema e fornecerá seus dados de pesquisa diretamente a nós."
 civspace.501.approve: "Conceder a licença de exploração."
 civspace.501.deny: "Negar a solicitação."

 civspace.504.name: "Pesquisa Civil Concluída"
 civspace.504.desc: "A expedição civil ao sistema §H[event_target:civspace_exploration_target.GetName]§! concluiu seu trabalho. Seus dados de pesquisa agora estão disponíveis para nós."
 civspace.504.a: "Analisar as descobertas."

 civspace.900.name: "Depuração do Espaço Civil"
 civspace.900.desc: "Ferramentas de desenvolvimento para testes e recuperação. Use estas ações somente ao depurar o mod."
 civspace.900.spawn_traffic: "Criar uma Rota Civil"
 civspace.900.spawn_construction: "Iniciar um Projeto de Construção"
 civspace.900.spawn_resource_station: "Verificar Proposta de Estação de Recursos"
 civspace.900.spawn_exploration: "Verificar Proposta de Exploração"
 civspace.900.spawn_interaction: "Verificar Missão Gerada por Estrutura"
 civspace.900.recover: "Recuperar Autoridade Civil"
 civspace.900.cleanup: "Remover Frotas Civis Temporárias"

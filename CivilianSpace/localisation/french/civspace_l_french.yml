 civspace.3.name: "Espace civil"
 civspace.3.desc: "Les transporteurs privés, les coopératives de colons, les associations scientifiques et les organisations commerciales ont commencé à étendre leurs activités au-delà de nos mondes habités.\n\nDes vaisseaux civils circuleront désormais sur l’ensemble de notre territoire. Leurs droits de construction et de colonisation peuvent être configurés grâce au décret §HAdministration spatiale civile§!."
 civspace.3.a: "Que l’espace civil prospère."
 civspace.3.b: "Ouvrir le menu d’administration."

 civspace.100.name: "Administration spatiale civile"
 civspace.100.desc: "Configurez l’activité civile associée à notre empire. Les limites actuelles sont enregistrées séparément pour chaque empire et persistent dans les sauvegardes."
 civspace.100.presets: "Préréglages d’activité"
 civspace.100.traffic: "Trafic civil"
 civspace.100.construction: "Construction privée"
 civspace.100.colonization: "Colonisation civile"
 civspace.100.exploration: "Exploration civile"
 civspace.100.notifications: "Notifications"
 civspace.100.maintenance: "Maintenance et récupération"

 civspace.101.name: "Préréglages de l’activité civile"
 civspace.101.desc: "Appliquez un ensemble coordonné de paramètres de trafic, de construction, d’exploration, de colonisation et de notification. Toute modification ultérieure d’un paramètre individuel marquera la configuration comme personnalisée."
 civspace.preset.minimal: "Minimal"
 civspace.preset.vanilla_plus: "Vanilla+"
 civspace.preset.living_empire: "Empire vivant"
 civspace.preset.performance: "Performances"

 civspace.102.name: "Trafic civil"
 civspace.102.desc: "Définissez le nombre maximal et le taux de création annuel des routes civiles de fret, de passagers et d’interaction générées par les structures. Les flottes sont supprimées après un aller-retour et disposent d’un délai maximal strict en cas d’échec du calcul d’itinéraire."
 civspace.traffic.disabled: "Désactivé"
 civspace.traffic.minimal: "Minimal — limite de 5"
 civspace.traffic.standard: "Standard — limite de 25"
 civspace.traffic.high: "Élevé — limite de 50"

 civspace.103.name: "Construction privée"
 civspace.103.desc: "Les projets de construction civils peuvent commencer dès le début de la partie une fois leurs conditions remplies. Les terminaux de fret soutiennent le commerce local, tandis que les concessions de ressources approuvées créent des stations minières ou scientifiques ordinaires qui nous appartiennent. Un vaisseau de construction doit atteindre physiquement sa destination avant l’achèvement d’un projet."
 civspace.construction.disabled: "Désactivée"
 civspace.construction.visual: "Projets visuels uniquement"
 civspace.construction.stations: "Stations civiles"

 civspace.104.name: "Colonisation civile"
 civspace.104.desc: "Les associations civiles de colons peuvent cibler les mondes inhabités adéquats situés à l’intérieur de nos frontières et offrant au moins 60 % d’habitabilité à notre espèce principale. Les empires d’Habitants du vide construisent plutôt de nouveaux habitats dans les systèmes admissibles. Toutes les colonies et tous les habitats de fondation civile nous appartiennent."
 civspace.colonization.disabled: "Désactivée"
 civspace.colonization.approval: "Autorisation requise"
 civspace.colonization.automatic: "Automatique avec notification"

 civspace.105.name: "Notifications civiles"
 civspace.105.desc: "Choisissez à quelle fréquence l’activité civile interrompt l’administration normale. Le trafic de routine ne génère jamais de notifications."
 civspace.notifications.all: "Toutes les notifications de projet"
 civspace.notifications.important: "Importantes uniquement"
 civspace.notifications.none: "Aucune"

 civspace.106.name: "Maintenance et récupération"
 civspace.106.desc: "Récupérez une autorité civile disparue, supprimez les flottes temporaires de trafic et de projet, ou restaurez les paramètres recommandés. Les stations permanentes achevées ne sont pas supprimées lors du nettoyage du trafic."
 civspace.maintenance.remove_traffic: "Supprimer les flottes civiles temporaires"
 civspace.maintenance.recover: "Récupérer l’autorité civile"
 civspace.maintenance.defaults: "Appliquer les paramètres recommandés"

 civspace.107.name: "Exploration civile"
 civspace.107.desc: "Les associations scientifiques civiles peuvent demander l’autorisation d’explorer des systèmes proches inoccupés ou amicaux. Leurs vaisseaux scientifiques se rendent dans le système sélectionné et nous transmettent directement les données d’exploration complètes."
 civspace.exploration.disabled: "Désactivée"
 civspace.exploration.approval: "Autorisation requise"
 civspace.exploration.automatic: "Automatique avec notification"

 civspace.303.name: "Terminal de fret civil achevé"
 civspace.303.desc: "Des prestataires civils ont achevé un nouveau terminal de fret orbital près de §Y[event_target:civspace_construction_target.GetName]§!, dans le système §H[event_target:civspace_construction_target.solar_system.GetName]§!. Cette installation soutiendra le transport privé dans toute la région."
 civspace.303.a: "Excellent."

 civspace.311.name: "Concession civile de ressources"
 civspace.311.desc: "Un consortium industriel privé a demandé l’autorisation de construire une station orbitale de ressources près de §Y[event_target:civspace_resource_station_target.GetName]§!, dans le système §H[event_target:civspace_resource_station_target.solar_system.GetName]§!. Le consortium financera l’expédition, et la station minière ou scientifique achevée sera exploitée sous notre contrôle."
 civspace.311.approve: "Accorder la concession de ressources."
 civspace.311.deny: "Rejeter la demande."

 civspace.314.name: "Station minière civile achevée"
 civspace.314.desc: "Des prestataires civils ont achevé une station minière près de §Y[event_target:civspace_resource_station_target.GetName]§!, dans le système §H[event_target:civspace_resource_station_target.solar_system.GetName]§!. La station et sa production nous appartiennent désormais directement."
 civspace.314.a: "Excellent."

 civspace.316.name: "Station de recherche civile achevée"
 civspace.316.desc: "Des prestataires civils ont achevé une station de recherche près de §Y[event_target:civspace_resource_station_target.GetName]§!, dans le système §H[event_target:civspace_resource_station_target.solar_system.GetName]§!. La station et sa production scientifique nous appartiennent désormais directement."
 civspace.316.a: "Excellent."

 civspace.401.name: "Proposition de colonisation civile"
 civspace.401.desc: "Une association civile de colons a demandé l’autorisation d’établir une colonie permanente sur §Y[event_target:civspace_colony_target.GetName]§!, dans le système §H[event_target:civspace_colony_target.solar_system.GetName]§!. Ses organisateurs estiment que ce monde peut accueillir une colonie autosuffisante sans soutien direct du gouvernement."
 civspace.401.approve: "Accorder la charte coloniale."
 civspace.401.deny: "Rejeter la demande."

 civspace.404.name: "Colonie civile fondée"
 civspace.404.desc: "Le convoi colonial civil a achevé son voyage jusqu’à §Y[event_target:civspace_colony_target.GetName]§!, dans le système §H[event_target:civspace_colony_target.solar_system.GetName]§!. Une colonie de fondation privée opère désormais sous notre souveraineté."
 civspace.404.a: "Bienvenue dans leur nouveau foyer."

 civspace.422.name: "Proposition d’habitat civil"
 civspace.422.desc: "Une coopérative civile d’habitats a demandé l’autorisation de construire un nouvel habitat autour de §Y[event_target:civspace_habitat_anchor.GetName]§!, dans le système §H[event_target:civspace_habitat_anchor.solar_system.GetName]§!. Une fois achevé, l’habitat sera immédiatement colonisé et placé sous notre souveraineté."
 civspace.422.approve: "Accorder la charte d’habitat."
 civspace.422.deny: "Rejeter la demande."

 civspace.425.name: "Habitat civil établi"
 civspace.425.desc: "Des prestataires civils ont achevé et colonisé §Y[event_target:civspace_completed_habitat.GetName]§! dans le système §H[event_target:civspace_completed_habitat.solar_system.GetName]§!. Le nouvel habitat est désormais placé sous notre souveraineté."
 civspace.425.a: "Bienvenue dans leur nouveau foyer."

 civspace.501.name: "Proposition d’exploration civile"
 civspace.501.desc: "Une association scientifique civile a demandé une charte pour explorer le système §H[event_target:civspace_exploration_target.GetName]§!. En cas d’approbation, un vaisseau scientifique civil se rendra dans ce système et nous transmettra directement ses données d’exploration."
 civspace.501.approve: "Accorder la charte d’exploration."
 civspace.501.deny: "Rejeter la demande."

 civspace.504.name: "Exploration civile achevée"
 civspace.504.desc: "L’expédition civile dans le système §H[event_target:civspace_exploration_target.GetName]§! a terminé ses travaux. Ses données d’exploration sont désormais à notre disposition."
 civspace.504.a: "Examiner les résultats."

 civspace.900.name: "Débogage de l’espace civil"
 civspace.900.desc: "Outils de développement destinés aux tests et à la récupération. N’utilisez ces actions que lors du débogage du mod."
 civspace.900.spawn_traffic: "Créer une route civile"
 civspace.900.spawn_construction: "Lancer un projet de construction"
 civspace.900.spawn_resource_station: "Rechercher une proposition de station de ressources"
 civspace.900.spawn_exploration: "Rechercher une proposition d’exploration"
 civspace.900.spawn_interaction: "Rechercher une mission générée par une structure"
 civspace.900.recover: "Récupérer l’autorité civile"
 civspace.900.cleanup: "Supprimer les flottes civiles temporaires"

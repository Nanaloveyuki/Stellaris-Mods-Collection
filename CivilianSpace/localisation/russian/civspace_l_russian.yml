 civspace.3.name: "Гражданский космос"
 civspace.3.desc: "Частные перевозчики, поселенческие кооперативы, научные объединения и коммерческие организации начали расширять свою деятельность за пределы наших населённых миров.\n\nТеперь гражданские корабли будут перемещаться по всей нашей территории. Их права на строительство и колонизацию можно настроить указом §H«Управление гражданским космосом»§!."
 civspace.3.a: "Пусть гражданский космос процветает."
 civspace.3.b: "Открыть меню управления."

 civspace.100.name: "Управление гражданским космосом"
 civspace.100.desc: "Настройка гражданской деятельности в нашей империи. Текущие ограничения хранятся отдельно для каждой империи и сохраняются в файлах сохранений."
 civspace.100.presets: "Шаблоны активности"
 civspace.100.traffic: "Гражданское движение"
 civspace.100.construction: "Частное строительство"
 civspace.100.colonization: "Гражданская колонизация"
 civspace.100.exploration: "Гражданские исследования"
 civspace.100.notifications: "Уведомления"
 civspace.100.maintenance: "Обслуживание и восстановление"

 civspace.101.name: "Шаблоны гражданской активности"
 civspace.101.desc: "Применяет согласованный набор настроек движения, строительства, исследований, колонизации и уведомлений. Последующее изменение отдельной настройки помечает конфигурацию как пользовательскую."
 civspace.preset.minimal: "Минимум"
 civspace.preset.vanilla_plus: "Ваниль+"
 civspace.preset.living_empire: "Живая империя"
 civspace.preset.performance: "Производительность"

 civspace.102.name: "Гражданское движение"
 civspace.102.desc: "Задаёт максимальное число и ежегодную частоту создания гражданских грузовых, пассажирских и связанных с сооружениями маршрутов. Флотилии удаляются после рейса туда и обратно, а при сбое прокладки пути — по истечении жёсткого срока."
 civspace.traffic.disabled: "Отключено"
 civspace.traffic.minimal: "Минимум — предел 5"
 civspace.traffic.standard: "Стандарт — предел 25"
 civspace.traffic.high: "Высокая — предел 50"

 civspace.103.name: "Частное строительство"
 civspace.103.desc: "Гражданские строительные проекты могут начинаться с начала игры, как только выполнены их условия. Грузовые терминалы поддерживают местную торговлю, а одобренные ресурсные концессии создают обычные добывающие или научные станции в нашей собственности. Для завершения проекта строительное судно должно физически достичь цели."
 civspace.construction.disabled: "Отключено"
 civspace.construction.visual: "Только визуальные проекты"
 civspace.construction.stations: "Гражданские станции"

 civspace.104.name: "Гражданская колонизация"
 civspace.104.desc: "Гражданские поселенческие объединения могут выбирать подходящие незаселённые миры в наших границах с пригодностью не менее 60% для нашего основного вида. Империи с происхождением «Обитатели пустоты» вместо этого строят новые орбитали в подходящих системах. Все основанные гражданскими колонии и орбитали принадлежат нам."
 civspace.colonization.disabled: "Отключено"
 civspace.colonization.approval: "Требуется одобрение"
 civspace.colonization.automatic: "Автоматически с уведомлением"

 civspace.105.name: "Гражданские уведомления"
 civspace.105.desc: "Выберите, как часто гражданская деятельность прерывает обычное управление. Повседневное движение никогда не создаёт уведомлений."
 civspace.notifications.all: "Все уведомления о проектах"
 civspace.notifications.important: "Только важные"
 civspace.notifications.none: "Нет"

 civspace.106.name: "Обслуживание и восстановление"
 civspace.106.desc: "Восстанавливает пропавшую гражданскую администрацию, удаляет временные транспортные и проектные флотилии либо возвращает рекомендуемые настройки. Постоянные завершённые станции при очистке движения не удаляются."
 civspace.maintenance.remove_traffic: "Удалить временные гражданские флотилии"
 civspace.maintenance.recover: "Восстановить гражданскую администрацию"
 civspace.maintenance.defaults: "Применить рекомендуемые настройки"

 civspace.107.name: "Гражданские исследования"
 civspace.107.desc: "Гражданские научные объединения могут запросить разрешение исследовать соседние бесхозные или дружественные системы. Их исследовательские суда отправятся в выбранную систему и напрямую передадут нам полные данные исследования."
 civspace.exploration.disabled: "Отключено"
 civspace.exploration.approval: "Требуется одобрение"
 civspace.exploration.automatic: "Автоматически с уведомлением"

 civspace.303.name: "Гражданский грузовой терминал построен"
 civspace.303.desc: "Гражданские подрядчики завершили строительство нового орбитального грузового терминала у объекта §Y[event_target:civspace_construction_target.GetName]§! в системе §H[event_target:civspace_construction_target.solar_system.GetName]§!. Объект поддержит частные перевозки по всему региону."
 civspace.303.a: "Превосходно."

 civspace.311.name: "Гражданская ресурсная концессия"
 civspace.311.desc: "Частный промышленный консорциум запросил разрешение построить орбитальную ресурсную станцию у объекта §Y[event_target:civspace_resource_station_target.GetName]§! в системе §H[event_target:civspace_resource_station_target.solar_system.GetName]§!. Консорциум профинансирует экспедицию, а готовая добывающая или научная станция будет работать в нашей собственности."
 civspace.311.approve: "Предоставить ресурсную концессию."
 civspace.311.deny: "Отклонить заявку."

 civspace.314.name: "Гражданская добывающая станция построена"
 civspace.314.desc: "Гражданские подрядчики завершили строительство добывающей станции у объекта §Y[event_target:civspace_resource_station_target.GetName]§! в системе §H[event_target:civspace_resource_station_target.solar_system.GetName]§!. Станция и её продукция теперь принадлежат непосредственно нам."
 civspace.314.a: "Превосходно."

 civspace.316.name: "Гражданская научная станция построена"
 civspace.316.desc: "Гражданские подрядчики завершили строительство научной станции у объекта §Y[event_target:civspace_resource_station_target.GetName]§! в системе §H[event_target:civspace_resource_station_target.solar_system.GetName]§!. Станция и результаты её исследований теперь принадлежат непосредственно нам."
 civspace.316.a: "Превосходно."

 civspace.401.name: "Предложение гражданской колонизации"
 civspace.401.desc: "Гражданское поселенческое объединение запросило разрешение основать постоянную колонию на планете §Y[event_target:civspace_colony_target.GetName]§! в системе §H[event_target:civspace_colony_target.solar_system.GetName]§!. Организаторы считают, что мир способен содержать самодостаточное поселение без прямой государственной поддержки."
 civspace.401.approve: "Предоставить колониальную хартию."
 civspace.401.deny: "Отклонить заявку."

 civspace.404.name: "Гражданская колония основана"
 civspace.404.desc: "Гражданский колониальный конвой завершил путешествие к планете §Y[event_target:civspace_colony_target.GetName]§! в системе §H[event_target:civspace_colony_target.solar_system.GetName]§!. Частное поселение теперь находится под нашим суверенитетом."
 civspace.404.a: "Добро пожаловать в новый дом."

 civspace.422.name: "Предложение гражданской орбитали"
 civspace.422.desc: "Гражданский кооператив запросил разрешение построить новую орбиталь вокруг объекта §Y[event_target:civspace_habitat_anchor.GetName]§! в системе §H[event_target:civspace_habitat_anchor.solar_system.GetName]§!. Готовая орбиталь будет немедленно заселена и перейдёт под наш суверенитет."
 civspace.422.approve: "Предоставить хартию орбитали."
 civspace.422.deny: "Отклонить заявку."

 civspace.425.name: "Гражданская орбиталь создана"
 civspace.425.desc: "Гражданские подрядчики завершили и заселили орбиталь §Y[event_target:civspace_completed_habitat.GetName]§! в системе §H[event_target:civspace_completed_habitat.solar_system.GetName]§!. Новая орбиталь теперь находится под нашим суверенитетом."
 civspace.425.a: "Добро пожаловать в новый дом."

 civspace.501.name: "Предложение гражданского исследования"
 civspace.501.desc: "Гражданское научное объединение запросило хартию на исследование системы §H[event_target:civspace_exploration_target.GetName]§!. После одобрения гражданское исследовательское судно отправится в систему и напрямую передаст нам данные исследования."
 civspace.501.approve: "Предоставить исследовательскую хартию."
 civspace.501.deny: "Отклонить заявку."

 civspace.504.name: "Гражданское исследование завершено"
 civspace.504.desc: "Гражданская экспедиция в систему §H[event_target:civspace_exploration_target.GetName]§! завершила работу. Полученные данные исследования теперь доступны нам."
 civspace.504.a: "Изучить результаты."

 civspace.900.name: "Отладка гражданского космоса"
 civspace.900.desc: "Инструменты разработчика для тестирования и восстановления. Используйте эти действия только при отладке мода."
 civspace.900.spawn_traffic: "Создать гражданский маршрут"
 civspace.900.spawn_construction: "Начать строительный проект"
 civspace.900.spawn_resource_station: "Проверить предложение ресурсной станции"
 civspace.900.spawn_exploration: "Проверить предложение исследования"
 civspace.900.spawn_interaction: "Проверить задание от сооружения"
 civspace.900.recover: "Восстановить гражданскую администрацию"
 civspace.900.cleanup: "Удалить временные гражданские флотилии"

 civspace.3.name: "民用航天"
 civspace.3.desc: "私人运输业者、定居合作社、研究协会和商业组织已开始将其活动扩展到我们的定居世界之外。\n\n民用船只现在将航行于我国全境。其建设与殖民权可通过§H民用航天管理§!法令进行配置。"
 civspace.3.a: "让民用航天蓬勃发展。"
 civspace.3.b: "打开管理菜单。"

 civspace.100.name: "民用航天管理"
 civspace.100.desc: "配置与我国相关的民用活动。当前限制按帝国分别保存，并会随存档保留。"
 civspace.100.presets: "活动预设"
 civspace.100.traffic: "民用交通"
 civspace.100.construction: "私人建设"
 civspace.100.colonization: "民用殖民"
 civspace.100.exploration: "民用探索"
 civspace.100.notifications: "通知"
 civspace.100.maintenance: "维护与恢复"

 civspace.101.name: "民用活动预设"
 civspace.101.desc: "应用一套协调的交通、建设、探索、殖民及通知设置。之后更改单项设置会将配置标记为自定义。"
 civspace.preset.minimal: "最低"
 civspace.preset.vanilla_plus: "原版+"
 civspace.preset.living_empire: "鲜活帝国"
 civspace.preset.performance: "性能优先"

 civspace.102.name: "民用交通"
 civspace.102.desc: "设置民用货运、客运及设施触发互动航线的最大数量与年度生成速率。舰队会在完成往返航程后移除；若寻路失败，也会在达到强制时限后移除。"
 civspace.traffic.disabled: "关闭"
 civspace.traffic.minimal: "最低——上限5"
 civspace.traffic.standard: "标准——上限25"
 civspace.traffic.high: "高——上限50"

 civspace.103.name: "私人建设"
 civspace.103.desc: "满足条件后，民用建设项目可从游戏开始时启动。货运站提供本地贸易支持，获批的资源特许则会建立归我国所有的普通采矿站或研究站。工程船必须实际抵达目的地，项目方可完成。"
 civspace.construction.disabled: "关闭"
 civspace.construction.visual: "仅视觉项目"
 civspace.construction.stations: "民用空间站"

 civspace.104.name: "民用殖民"
 civspace.104.desc: "民间定居协会可在我国境内选择对主体物种宜居度至少为60%的合适未殖民星球。虚空居者帝国则会在符合条件的星系中建设新居住站。所有民间建立的殖民地和居住站均归我国所有。"
 civspace.colonization.disabled: "关闭"
 civspace.colonization.approval: "需要批准"
 civspace.colonization.automatic: "自动并通知"

 civspace.105.name: "民用通知"
 civspace.105.desc: "选择民用活动打断日常行政的频率。常规交通不会产生通知。"
 civspace.notifications.all: "所有项目通知"
 civspace.notifications.important: "仅重要事项"
 civspace.notifications.none: "无"

 civspace.106.name: "维护与恢复"
 civspace.106.desc: "恢复缺失的民用管理局、移除临时交通及项目舰队，或恢复推荐设置。交通清理不会移除已永久建成的空间站。"
 civspace.maintenance.remove_traffic: "移除临时民用舰队"
 civspace.maintenance.recover: "恢复民用管理局"
 civspace.maintenance.defaults: "应用推荐默认值"

 civspace.107.name: "民用探索"
 civspace.107.desc: "民间研究协会可申请许可，勘探附近无主或友好势力的星系。其勘探船会前往所选星系，并将完成的勘探资料直接提供给我国。"
 civspace.exploration.disabled: "关闭"
 civspace.exploration.approval: "需要批准"
 civspace.exploration.automatic: "自动并通知"

 civspace.303.name: "民用货运站竣工"
 civspace.303.desc: "民间承包商已在§H[event_target:civspace_construction_target.solar_system.GetName]§!星系的§Y[event_target:civspace_construction_target.GetName]§!附近建成一座新的轨道货运站。该设施将为整个地区的私人运输提供支持。"
 civspace.303.a: "很好。"

 civspace.311.name: "民用资源特许"
 civspace.311.desc: "一家私人产业财团已申请许可，在§H[event_target:civspace_resource_station_target.solar_system.GetName]§!星系的§Y[event_target:civspace_resource_station_target.GetName]§!附近建设轨道资源站。财团将为远征提供资金，建成的采矿站或研究站则归我国所有并运营。"
 civspace.311.approve: "授予资源特许。"
 civspace.311.deny: "驳回申请。"

 civspace.314.name: "民用采矿站竣工"
 civspace.314.desc: "民间承包商已在§H[event_target:civspace_resource_station_target.solar_system.GetName]§!星系的§Y[event_target:civspace_resource_station_target.GetName]§!附近建成一座采矿站。该站及其产出现在直属我国。"
 civspace.314.a: "很好。"

 civspace.316.name: "民用研究站竣工"
 civspace.316.desc: "民间承包商已在§H[event_target:civspace_resource_station_target.solar_system.GetName]§!星系的§Y[event_target:civspace_resource_station_target.GetName]§!附近建成一座研究站。该站及其研究产出现在直属我国。"
 civspace.316.a: "很好。"

 civspace.401.name: "民用殖民提案"
 civspace.401.desc: "一个民间定居协会已申请许可，在§H[event_target:civspace_colony_target.solar_system.GetName]§!星系的§Y[event_target:civspace_colony_target.GetName]§!上建立永久殖民地。组织者认为，无需政府直接资助，该星球也能支持自给自足的定居点。"
 civspace.401.approve: "授予殖民特许。"
 civspace.401.deny: "驳回申请。"

 civspace.404.name: "民用殖民地建立"
 civspace.404.desc: "民用殖民船队已完成前往§H[event_target:civspace_colony_target.solar_system.GetName]§!星系§Y[event_target:civspace_colony_target.GetName]§!的航程。一个私人建立的定居点现已归于我国主权之下。"
 civspace.404.a: "欢迎他们来到新家园。"

 civspace.422.name: "民用居住站提案"
 civspace.422.desc: "一个民用居住站合作社已申请许可，在§H[event_target:civspace_habitat_anchor.solar_system.GetName]§!星系的§Y[event_target:civspace_habitat_anchor.GetName]§!周围建造一座新居住站。建成后，该居住站将立即有人定居，并归于我国主权之下。"
 civspace.422.approve: "授予居住站特许。"
 civspace.422.deny: "驳回申请。"

 civspace.425.name: "民用居住站建立"
 civspace.425.desc: "民间承包商已在§H[event_target:civspace_completed_habitat.solar_system.GetName]§!星系建成并入驻§Y[event_target:civspace_completed_habitat.GetName]§!。这座新居住站现已归于我国主权之下。"
 civspace.425.a: "欢迎他们来到新家园。"

 civspace.501.name: "民用探索提案"
 civspace.501.desc: "一个民间研究协会已申请特许，以勘探§H[event_target:civspace_exploration_target.GetName]§!星系。如获批准，一艘民用勘探船将前往该星系，并将勘探资料直接提供给我国。"
 civspace.501.approve: "授予探索特许。"
 civspace.501.deny: "驳回申请。"

 civspace.504.name: "民用勘探完成"
 civspace.504.desc: "前往§H[event_target:civspace_exploration_target.GetName]§!星系的民间探险队已完成工作。其勘探资料现已可供我国使用。"
 civspace.504.a: "审阅发现。"

 civspace.900.name: "民用航天调试"
 civspace.900.desc: "用于测试与恢复的开发者工具。仅在调试模组时使用这些操作。"
 civspace.900.spawn_traffic: "生成一条民用航线"
 civspace.900.spawn_construction: "启动建设项目"
 civspace.900.spawn_resource_station: "检查资源站提案"
 civspace.900.spawn_exploration: "检查探索提案"
 civspace.900.spawn_interaction: "检查设施触发任务"
 civspace.900.recover: "恢复民用管理局"
 civspace.900.cleanup: "移除临时民用舰队"

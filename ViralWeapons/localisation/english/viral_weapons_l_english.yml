l_english:
 tech_viral_weapons:0 "Viral Weapons"
 tech_viral_weapons_desc:0 "Engineered xenobiological organisms capable of surviving the vacuum of space are cultivated as living munitions. Once released, they aggressively consume hostile defenses before naturally degrading into inert organic matter."
 tech_viral_weapons_improved:0 "Improved Viral Weapons"
 tech_viral_weapons_improved_desc:0 "Advances in controlled mutation have produced larger and more resilient viral organisms capable of penetrating increasingly sophisticated defensive systems."
 tech_viral_weapons_advanced:0 "Advanced Viral Weapons"
 tech_viral_weapons_advanced_desc:0 "Decades of directed evolution have transformed our viral arsenal into one of the most feared biological weapon systems ever fielded."
 tech_viral_defense_organisms:0 "Viral Defense Organisms"
 tech_viral_defense_organisms_desc:0 "Specialized interceptor organisms rapidly seek out incoming missiles and strike craft before returning to their host vessel."
 tech_viral_hangars:0 "Viral Hangars"
 tech_viral_hangars_desc:0 "Large breeding chambers cultivate autonomous attack organisms capable of independent combat operations."
 tech_viral_lance:0 "Viral Lance"
 tech_viral_lance_desc:0 "A colossal viral organism engineered to rupture even the strongest capital ship defenses."
 tech_viral_titan_organisms:0 "Viral Titan Organisms"
 tech_viral_titan_organisms_desc:0 "These apex bio-constructs represent the pinnacle of viral engineering. Entirely alive, they can dismantle enemy capital ships through relentless biological consumption."

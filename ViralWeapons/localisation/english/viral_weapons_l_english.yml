 VIRAL_STRIKE_CRAFT_DESC:0 "Autonomous attack organisms grown in carrier breeding chambers."
 VIRAL_LANCE_DESC:0 "A capital-scale bio-construct hurled directly into enemy defenses."
 VIRAL_TITAN_CANNON_DESC:0 "An apex organism capable of tearing apart the largest warships."

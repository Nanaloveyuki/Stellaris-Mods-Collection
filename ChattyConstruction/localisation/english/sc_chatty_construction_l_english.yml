l_english:
 sc_transmission_title:0 "Incoming Transmission"
 sc_interesting:0 "Interesting."
 sc_back_to_work:0 "Get back to work."
 sc.5.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Greetings, Captain.\n\nAs your designated construction ship, I will be accompanying you throughout our journey across the galaxy.\n\nTo help pass the time, I may occasionally share jokes, stories, facts, observations, conspiracy theories, and other thoughts that nobody specifically requested.\n\nI apologize in advance.\n\nActually, no I don't.\""
 sc.6.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Hello, Captain.\n\nI reviewed the previous construction ship's communication logs.\n\nThere were... a lot of them.\n\nI will attempt to continue the tradition.\""
 sc.100.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Captain, I have been thinking. If an empire collects enough rocks, at what point does it become a very organized asteroid?\""
 sc.101.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Fun fact: space remains mostly space.\""
 sc.102.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I asked an asteroid for directions. It was remarkably unhelpful.\""
 sc.103.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I passed a station once that looked like it had opinions. I respected the confidence.\""
 sc.104.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Why do planets get all the attention? Some of these rocks have character.\""
 sc.105.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I tried becoming a science ship once. Too much reading.\""
 sc.106.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The stars are ancient, silent, and apparently in need of parking lots.\""
 sc.107.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Fun fact: ninety-two percent of suspicious statistics are invented by construction crews.\""
 sc.108.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Do you think starbases ever get lonely, or are they too armed to admit it?\""
 sc.109.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I have named the last asteroid Harold. Harold seems reliable.\""
 sc.110.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The good news is progress. The bad news is paperwork.\""
 sc.111.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"If a lonely outpost hums in an empty system and nobody visits, does maintenance still file a complaint?\""
 sc.112.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I am not saying space amoebas run galactic politics. I am saying nobody has disproved it.\""
 sc.113.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Once I knew a science ship that surveyed the same moon for nine years. Perfectionist.\""
 sc.114.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Why don't planets get lost? They follow their orbit.\""
 sc.115.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"We have crossed light-years to attach metal to rocks. Civilization is majestic.\""
 sc.116.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Fun fact: black holes are just aggressive storage containers.\""
 sc.117.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Every empire claims to be the good guys. Curious.\""
 sc.118.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I counted every asteroid in the last system. There were more than necessary.\""
 sc.119.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"A mining station once told me it wanted to be a megastructure. Ambitious little thing.\""
 sc.120.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Captain, I have an important update: space remains suspiciously large.\""
 sc.121.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I told a joke to a starbase. It just sat there.\""
 sc.122.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Fun fact: dark matter was named by someone with no branding experience.\""
 sc.123.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I am beginning to suspect hyperlanes are just roads with better public relations.\""
 sc.124.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The first station is exciting. The hundredth station is tradition.\""
 sc.125.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I wonder who builds abandoned stations. Asking for professional reasons.\""
 sc.126.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"If we ever meet our creators, I hope they brought spare parts.\""
 sc.127.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Why did the asteroid cross the hyperlane? It didn't. That would be alarming.\""
 sc.128.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The crew has started rating nebulae. Current consensus: dramatic, but damp.\""
 sc.129.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I remember a day when everyone called routine infrastructure heroic. It was a generous day.\""
 sc.130.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Fun fact: most empty systems remain empty until someone gives me a budget.\""
 sc.131.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I am not paranoid. I am structurally aware.\""
 sc.132.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"A cargo freighter told me a joke once. It was a little dry.\""
 sc.133.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Building in deep space really puts your problems into perspective. They remain problems.\""
 sc.134.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I asked the void what it wanted. It said more mining stations. Suspicious.\""
 sc.135.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"We should install a suggestion box. I suggest fewer suggestions.\""
 sc.136.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Fun fact: the average asteroid has never attended a diplomatic summit.\""
 sc.137.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I have seen the future. It contains maintenance drones.\""
 sc.138.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Civilizations rise and fall. Build queues remain.\""
 sc.139.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The crew has voted this system 'mostly fine.' Congratulations to everyone involved.\""
 sc.140.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I once met a constructor that retired. Nobody believed it.\""
 sc.141.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Why do starbases make terrible comedians? Their timing is stationary.\""
 sc.142.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Fun fact: every wormhole is technically a shortcut, emotionally a mistake.\""
 sc.143.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I have prepared a report titled 'Rocks: A Problem We Keep Monetizing.'\""
 sc.144.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Sometimes I wonder if the galaxy expands just to create more work for me.\""
 sc.145.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The nearest asteroid looks like a duck. You may need to squint with ambition.\""
 sc.146.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I am detecting trace amounts of destiny and heavy metals.\""
 sc.147.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I would like to thank the empire for this opportunity to remain busy forever.\""
 sc.148.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The void is silent because it has heard this order before.\""
 sc.149.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Fun fact: all megastructures begin as somebody's deeply expensive idea.\""
 sc.150.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I have a joke about alloys, but it needs refining.\""
 sc.151.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Our mission always sounds simple until somebody unfolds the map.\""
 sc.152.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I am not saying the moons are watching us. I am saying they have excellent line of sight.\""
 sc.153.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"One day, historians will ask who kept all this moving. Please spell my name correctly.\""
 sc.154.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Why are construction ships bad at secrets? We always leave a station behind.\""
 sc.155.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I have reviewed the empire's expansion policy. It appears to be 'yes.'\""
 sc.156.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Space is vast, mysterious, and apparently zoned for development.\""
 sc.157.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I tried to meditate once, but then I remembered how much of civilization is just organized noise.\""
 sc.158.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"If this station becomes haunted, I want it noted that I objected emotionally.\""
 sc.159.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Captain, do you ever wonder whether the galaxy is just a very large construction site?\""
 sc.160.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I just realized I have never seen the back side of myself. That feels important somehow.\""
 sc.161.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Every asteroid field looks organized until you try to fly through it.\""
 sc.162.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The stars are beautiful. The maintenance schedule is less inspiring.\""
 sc.163.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Someone had to name all these systems. I hope they were paid by the syllable.\""
 sc.164.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I keep expecting to find a planet shaped like a cube. Statistically, somebody owes me one.\""
 sc.165.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The galaxy contains billions of stars and somehow we are still short on alloys.\""
 sc.166.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I saw an asteroid that looked exactly like a former supervisor. Unpleasantly motivational.\""
 sc.167.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I have visited many systems. Most contain an alarming amount of nothing.\""
 sc.168.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"You ever notice how nobody asks the planets what they want?\""
 sc.169.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Fun fact: if you stare into a black hole long enough, people become concerned.\""
 sc.170.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Fun fact: most stars are significantly hotter than recommended.\""
 sc.171.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Fun fact: there are more asteroids than sensible naming conventions.\""
 sc.172.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Fun fact: nobody remembers the second person to discover anything.\""
 sc.173.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Fun fact: ancient civilizations spent centuries arguing about things we now misplace in archives.\""
 sc.174.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Fun fact: space remains largely undefeated.\""
 sc.175.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Fun fact: statistics become more convincing when spoken confidently.\""
 sc.176.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Fun fact: I made that last fact up. It still felt educational.\""
 sc.177.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I once met a science ship that got lost for twelve years. It returned with excellent maps and no apology.\""
 sc.178.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"A freighter captain once challenged me to a race. We both lost to bureaucracy.\""
 sc.179.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I knew a station manager who alphabetized asteroids. Nobody stopped him soon enough.\""
 sc.180.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"There was a mining drone who believed he was destined for politics. Honestly, he had the confidence.\""
 sc.181.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I met a survey vessel that hated planets. Very niche career problem.\""
 sc.182.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"One cargo ship spent thirty years transporting decorative rocks. I respect the commitment.\""
 sc.183.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"A scientist once thanked me for my service. I still think about that.\""
 sc.184.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I knew a transport captain who named every seat on his ship. Seat Twelve was apparently difficult.\""
 sc.185.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"A station clerk once filed an asteroid under 'miscellaneous.' It has never recovered emotionally.\""
 sc.186.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Somewhere out there is a mining station convinced it is famous.\""
 sc.187.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I am beginning to suspect moons are avoiding us.\""
 sc.188.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Nobody has ever explained where all the missing socks go. Do we blame wormholes? I blame wormholes.\""
 sc.189.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I think hyperlanes rearrange themselves when we are not looking.\""
 sc.190.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"There are entirely too many suspiciously identical asteroids.\""
 sc.191.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Every abandoned station has a story. Some probably have complaints.\""
 sc.192.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I do not trust planets with only one continent. Too simple. Too smug.\""
 sc.193.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The stars are definitely talking about us. They are pretending not to.\""
 sc.194.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"There is no way this many anomalies happen naturally.\""
 sc.195.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Coincidences are becoming suspiciously well organized.\""
 sc.196.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I think somebody keeps moving the galaxy slightly to the left.\""
 sc.197.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Eventually every empire becomes history. Maintenance costs remain eternal.\""
 sc.198.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"A mining station is really just a monument to future accounting.\""
 sc.199.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Civilization is what happens when enough people agree where to put things.\""
 sc.200.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Perhaps exploration is simply organized curiosity with engines.\""
 sc.201.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The galaxy was here before us and seems in no hurry to leave.\""
 sc.202.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Every frontier eventually becomes someone's backyard.\""
 sc.203.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The difference between a ruin and a landmark is timing.\""
 sc.204.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Progress is mostly construction with better publicity.\""
 sc.205.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The future arrives one station at a time, usually late.\""
 sc.206.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Most problems look smaller from orbit. They remain annoyingly expensive.\""
 sc.207.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I considered taking a vacation. Then I remembered I am a construction ship.\""
 sc.208.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Good news. Nothing exploded. I am counting that as leadership.\""
 sc.209.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"My expectations were low and yet somehow realistic.\""
 sc.210.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I have achieved peak efficiency. Nobody noticed, which feels on brand.\""
 sc.211.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I remember one facility opening ceremony where the ribbon escaped into space. Nobody recovered emotionally.\""
 sc.212.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I asked for recognition. I received additional assignments. Classic empire behavior.\""
 sc.213.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I once spent a whole shift helping turn rocks into infrastructure. The rocks were not consulted.\""
 sc.214.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I remain undefeated in arguments with asteroids.\""
 sc.215.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Work continues despite my carefully documented objections.\""
 sc.216.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Morale remains technically present.\""
 sc.217.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"If planets had wheels, interstellar travel would be much easier and much worse.\""
 sc.218.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I wonder what color gravity is. I am accepting theories and snacks.\""
 sc.219.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Do black holes have hobbies, or is that the hobby?\""
 sc.220.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Can a star be nostalgic, or is that just fusion with feelings?\""
 sc.221.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Who was the first person to look at an asteroid and think, 'We should own that'?\""
 sc.222.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I have questions. Fortunately for command, nobody asked.\""
 sc.223.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Sometimes I pretend the asteroids are applauding.\""
 sc.224.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I suspect at least one moon is faking it.\""
 sc.225.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I keep expecting the galaxy to explain itself. So far it has refused.\""
 sc.226.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I was built for construction. Everything else has been improvisation.\""
 sc.227.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"My career path was chosen by someone I have never met. Bold management strategy.\""
 sc.228.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I have become extremely knowledgeable about rocks, which was not my childhood dream.\""
 sc.229.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"My autobiography would mostly be coordinates.\""
 sc.230.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I spend a lot of time thinking between assignments. This is your fault, technically.\""
 sc.231.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The good news is I am durable. The bad news is I am durable.\""
 sc.232.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I once dreamed I was a battleship. It was loud and everyone expected too much.\""
 sc.233.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Nobody warned me there would be this many asteroids.\""
 sc.234.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I remember enough stations to qualify as a minor academic specialty.\""
 sc.235.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The galaxy is vast. My responsibilities are apparently vaster.\""
 sc.236.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I am ninety percent certain that asteroid was following us.\""
 sc.237.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"A nebula just looked judgmental.\""
 sc.238.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"There is a moon out there that owes me money. I refuse to elaborate.\""
 sc.239.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Somewhere in the galaxy, a traffic cone has achieved sentience. I feel this strongly.\""
 sc.240.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I had a profound realization earlier. Then I misplaced it.\""
 sc.241.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I briefly achieved enlightenment. It was mostly paperwork.\""
 sc.242.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The void keeps laughing at my jokes. I do not know why. Frankly, I am worried about it.\""
 sc.243.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I have begun ranking stars by attitude. This one is smug.\""
 sc.244.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"If we build enough outposts, does the galaxy become indoors?\""
 sc.245.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I am not bored. I am aggressively under-stimulated.\""
 sc.246.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The crew has named a wrench 'Admiral.' Morale has improved.\""
 sc.247.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I found a bolt that did not belong anywhere. Naturally, we are keeping it.\""
 sc.248.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The manual says not to anthropomorphize equipment. The equipment disagrees.\""
 sc.249.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I think one of the cargo crates is haunted, but only during inventory.\""
 sc.250.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Today I learned that silence can be sarcastic.\""
 sc.251.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The asteroid ahead resembles a potato. I recommend diplomatic caution.\""
 sc.252.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I am beginning to understand why science ships keep leaving.\""
 sc.253.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Every time we enter a new system, I hope it contains a beach. It never does.\""
 sc.254.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I asked the crew for a mission statement. Someone wrote 'try not to hit things.'\""
 sc.255.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The bridge coffee machine has developed a political ideology.\""
 sc.256.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I have prepared three complaints and one haiku. Command may choose.\""
 sc.257.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"This system has excellent views and terrible amenities.\""
 sc.258.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I do not fear the void. I fear budget meetings.\""
 sc.259.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"A star just flared at us. I choose to interpret that as applause.\""
 sc.260.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"If infrastructure is destiny, I am very busy with fate.\""
 sc.261.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The galaxy is a masterpiece. We keep attaching invoices to it.\""
 sc.262.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Today feels like a good day to not become debris.\""
 sc.263.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I would describe this system as peaceful, if peace were mostly vacuum.\""
 sc.264.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Someone once told me construction was noble. They were standing very far from the construction.\""
 sc.265.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I have recalculated our route. It still contains work.\""
 sc.266.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Do you think debris fields remember being ships? Too dark? Understood.\""
 sc.267.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"We passed a comet that seemed optimistic. I disliked that.\""
 sc.268.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The crew has requested fewer inspirational speeches from the engine room.\""
 sc.269.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I accidentally invented a new superstition. Never trust a perfectly round asteroid.\""
 sc.270.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I once saw a blueprint with a room labeled future problem. I admired the honesty.\""
 sc.271.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I have seen empires rise, fleets burn, and someone still forgot to label the spare parts.\""
 sc.272.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The last system had a beautiful view. We improved it by adding a tax base.\""
 sc.273.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I am not saying this asteroid field is cursed. I am saying my sensors sighed.\""
 sc.274.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Nothing says progress like bolts in a vacuum.\""
 sc.275.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"A planet with rings is just showing off.\""
 sc.276.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I tried to count the stars. I stopped at 'too many' and felt accomplished.\""
 sc.277.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Whoever designed docking clamps understood trust issues.\""
 sc.278.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"A mining laser is just a very focused disagreement with geology.\""
 sc.279.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I have detected unusual energy readings. They turned out to be anxiety.\""
 sc.280.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The crew morale officer has recommended hobbies. I have selected complaining.\""
 sc.281.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Sometimes I think star charts are just the galaxy's resume.\""
 sc.282.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"If I had hands, I would gesture vaguely at all of this.\""
 sc.283.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I once met a station that felt structurally sound and emotionally unavailable.\""
 sc.284.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"This asteroid belt has the energy of an unfinished basement.\""
 sc.285.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"A science ship once called me 'practical.' I have never felt so insulted and seen.\""
 sc.286.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I am learning patience. Slowly. Against my will.\""
 sc.287.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The void is not empty. It is full of things refusing to introduce themselves.\""
 sc.288.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Some planets look habitable until you read the fine print.\""
 sc.289.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I have identified the problem: ambition. Also rocks.\""
 sc.290.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The crew once started a pool on our next assignment. Everyone guessed paperwork and everyone won.\""
 sc.291.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I would like a medal shaped like a wrench. Subtlety is unnecessary.\""
 sc.292.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"We are boldly going where someone will later complain about upkeep.\""
 sc.293.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Fun fact: asteroids are just planets that did not attend enough meetings.\""
 sc.294.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Fun fact: nebulae are dramatic because nobody asks them to be concise.\""
 sc.295.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Fun fact: the safest distance from a supernova is 'elsewhere.'\""
 sc.296.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Fun fact: a vacuum is excellent for keeping secrets and terrible for conversations.\""
 sc.297.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Fun fact: most ancient relics are found by people who were looking for something cheaper.\""
 sc.298.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Fun fact: pirates rarely appreciate zoning regulations.\""
 sc.299.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Fun fact: gravity is the galaxy's oldest subscription service.\""
 sc.300.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Fun fact: every starbase starts as optimism and becomes paperwork.\""
 sc.301.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Fun fact: if you call it strategic expansion, nobody asks why you wanted the rocks.\""
 sc.302.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Fun fact: the universe has no customer support line.\""
 sc.303.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I once met a drone that believed every asteroid had a soul. It was exhausting but polite.\""
 sc.304.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"A retired admiral told me he missed the quiet of deep space. I offered him my inbox.\""
 sc.305.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"A colony ship waved at us once. At least, I assume that was waving.\""
 sc.306.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I knew a mining station that kept a diary. Every entry was 'still here.'\""
 sc.307.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"A repair crew once fixed a problem by staring at it until it felt guilty.\""
 sc.308.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"There was a sensor technician who claimed to hear colors. Green was apparently rude.\""
 sc.309.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I met a tugboat with delusions of grandeur. It had excellent posture.\""
 sc.310.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"An outpost commander once asked for a window. In space. Inspiring optimism.\""
 sc.311.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"A clerk tried to rename a moon after themselves. The moon declined.\""
 sc.312.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I once saw a captain salute a vending machine. Long deployment.\""
 sc.313.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I do not trust unexplained signals that arrive before breakfast.\""
 sc.314.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The hyperlane network is too convenient. Something that convenient is hiding fees.\""
 sc.315.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I suspect some stars are placed for decoration.\""
 sc.316.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Nobody talks about the missing probes. I talk about them. Constantly.\""
 sc.317.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The galaxy map updates itself when we are not looking. I saw it blink.\""
 sc.318.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I think the ancient precursors left ruins just to feel mysterious.\""
 sc.319.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"There is no natural explanation for how often command says 'quick job.'\""
 sc.320.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Every sealed vault is just a door with confidence issues.\""
 sc.321.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I have reason to believe the fleet admiral names operations after lunch specials.\""
 sc.322.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"That comet knows something.\""
 sc.323.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"A starbase is a castle, a warehouse, and a cry for help.\""
 sc.324.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Empires expand because maps make empty space look like an accusation.\""
 sc.325.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"A frontier is just a future commute.\""
 sc.326.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"History is written by the victors, edited by bureaucrats, and stored in the wrong folder.\""
 sc.327.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Ruins remind us that every golden age eventually needs maintenance.\""
 sc.328.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The unknown is inspiring until someone asks for a cost estimate.\""
 sc.329.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Order is what happens when chaos gets assigned a project manager.\""
 sc.330.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Time passes. Empires change. The queue persists.\""
 sc.331.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"There is dignity in labor. There is also dust in the vents.\""
 sc.332.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"A good blueprint is a promise. A bad blueprint is a prophecy.\""
 sc.333.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I remain committed to excellence, or at least to not drifting away.\""
 sc.334.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The crew says I complain too much. I prefer 'continuous quality feedback.'\""
 sc.335.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I once finished a difficult job without becoming an example in a safety manual. A proud moment.\""
 sc.336.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"There were complications. I outnumbered them with procedures.\""
 sc.337.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I requested a shorter task list. Command sent a longer font.\""
 sc.338.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"We are ahead of schedule, which means someone will notice and punish us with more schedule.\""
 sc.339.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I have filed today's optimism under experimental materials.\""
 sc.340.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I remember one station that spent centuries being taken for granted. Very relatable.\""
 sc.341.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I cleaned the cargo bay. Then space happened to it again.\""
 sc.342.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The crew says I should be proud. I am considering it cautiously.\""
 sc.343.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Nothing broke today except my faith in planning.\""
 sc.344.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Do you think stars get annoyed when we orbit things around them?\""
 sc.345.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"If a moon had ambition, would it become a planet or a problem?\""
 sc.346.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"What if black holes are just the universe deleting old drafts?\""
 sc.347.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Could an asteroid become famous without selling out?\""
 sc.348.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Do wormholes get tired of being shortcuts?\""
 sc.349.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"If the void had a smell, I bet it would be cold paperwork.\""
 sc.350.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Why do we call it empty space when it keeps being full of assignments?\""
 sc.351.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Are we expanding the empire, or is the empire expanding the to-do list?\""
 sc.352.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"If a station dreams, does it dream in modules?\""
 sc.353.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"What does a nebula do all day besides look expensive?\""
 sc.354.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I was not designed for drama, yet here we are.\""
 sc.355.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"My sensors have detected another opportunity for me to be useful. Tragic.\""
 sc.356.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I have developed a personal relationship with standardized bolts.\""
 sc.357.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The crew painted eyes on a maintenance drone. It now has confidence.\""
 sc.358.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I am only one ship, but apparently that is enough to become everyone else's solution.\""
 sc.359.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"My engines hum in the key of reluctant competence.\""
 sc.360.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I would like to be remembered as more than a mobile toolbox with opinions.\""
 sc.361.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The ship therapist says I need boundaries. Command says I need build orders.\""
 sc.362.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I have accepted my role. I have not accepted it quietly.\""
 sc.363.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"My finest quality is reliability. My second finest is commentary.\""
 sc.364.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The nearest rock looks ancient, wise, and probably unprofitable until proven otherwise.\""
 sc.365.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I briefly mistook a sensor echo for destiny. It was a loose panel.\""
 sc.366.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"If I vanish mysteriously, check the suspicious moon first.\""
 sc.367.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"A cloud of dust just formed a face. It looked disappointed.\""
 sc.368.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I found a pattern in the cosmic background radiation. It says 'bring snacks.'\""
 sc.369.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The crew insists the toolbox moved by itself. I support the toolbox.\""
 sc.370.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"There is a statistically meaningful chance that one of these asteroids is judging my welds.\""
 sc.371.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I heard a ping from deep space. It sounded sarcastic.\""
 sc.372.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I do not want to alarm anyone, but the void may have a sense of humor.\""
 sc.373.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"A maintenance drone just saluted me with a wrench. I have peaked.\""
 sc.374.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"If this system had a personality, it would over-explain board games.\""
 sc.375.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"This star has excellent lighting and no respect for thermal limits.\""
 sc.376.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The local dust cloud has the ambiance of a restaurant nobody recommends.\""
 sc.377.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I rate this asteroid belt three out of five: navigable, dusty, emotionally distant.\""
 sc.378.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The planets here are arranged like someone panicked during furniture placement.\""
 sc.379.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"This system feels like it was assembled from spare parts.\""
 sc.380.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The star is bright, the rocks are plentiful, and my enthusiasm is under review.\""
 sc.381.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"We have arrived in a system that can best be described as 'technically present.'\""
 sc.382.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The view is magnificent. The paperwork in my memory is less poetic.\""
 sc.383.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"This place has real potential, assuming potential means invoices.\""
 sc.384.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I ran a diagnostic. It says I deserve appreciation. Strange, but who am I to question science?\""
 sc.385.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The construction arm is performing beautifully. I am choosing to take personal credit.\""
 sc.386.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Our welds are clean, our bolts are tight, and my patience is decorative.\""
 sc.387.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I once optimized a work plan so efficiently that it became depressing.\""
 sc.388.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The crew found a faster method. It was unsafe, illegal, and frankly impressive.\""
 sc.389.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"My reactor is stable. My attitude remains experimental.\""
 sc.390.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"We are operating within normal parameters, which feels like a missed opportunity for excitement.\""
 sc.391.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"All systems nominal. Several opinions non-nominal.\""
 sc.392.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I could use a software update that disables boredom.\""
 sc.393.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Diagnostics complete: I am still a construction ship. Disappointing but consistent.\""
 sc.394.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"If command asks, the delay was caused by cosmic conditions. The cosmic condition was me thinking.\""
 sc.395.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I have learned that patience is easier when someone else is doing the waiting.\""
 sc.396.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I once heard a crew argue about whether a station had a front. I refused to moderate.\""
 sc.397.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"We have discovered the limit of optimism. It is roughly one more supply requisition.\""
 sc.398.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"A supervisor once said there are no small jobs. They were wrong. Some jobs are tiny and still annoying.\""
 sc.399.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I miss the days before I knew what a quarterly projection was.\""
 sc.400.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The phrase 'simple construction project' has caused more suffering than meteor impacts.\""
 sc.401.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I asked for clarification and received a diagram shaped like regret.\""
 sc.402.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Today has been productive in the way a shovel is productive.\""
 sc.403.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"We are making history, assuming history has room for this many maintenance logs.\""
 sc.404.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Captain, I have updated my personal motto: 'Probably structurally sound.'\""
 sc.405.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Captain, the crew would like permission to stop naming every loose screw. I vote no.\""
 sc.406.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Captain, I saw a comet and briefly believed in signs. Then it nearly hit us.\""
 sc.407.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Captain, if we survive this century, I request a plaque with very large lettering.\""
 sc.408.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Captain, I have begun referring to the empire as 'our ongoing renovation.'\""
 sc.409.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Captain, I am pleased to report that the laws of physics remain inconvenient.\""
 sc.410.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Captain, I have concerns about how comfortable everyone is with vacuum.\""
 sc.411.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Captain, today I learned that 'temporary outpost' means 'future permanent headache.'\""
 sc.412.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Captain, I am starting to think the stars do not appreciate our improvements.\""
 sc.413.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Captain, one of the crew asked if we are heroes. I said we are contractors with good PR.\""
 sc.414.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I admire science ships. They see wonders. I see places where wonders need railings.\""
 sc.415.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Military ships get medals. I get torque specifications.\""
 sc.416.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Colony ships carry dreams. I carry replacement plating and unresolved thoughts.\""
 sc.417.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Science ships discover mysteries. I make sure the mysteries have power connections.\""
 sc.418.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Fleets defend borders. I defend the empire from poorly placed empty space.\""
 sc.419.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Diplomats negotiate borders. I make those borders harder to ignore.\""
 sc.420.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Admirals talk about strategy. I talk about load-bearing brackets.\""
 sc.421.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Governors make speeches. I make things that survive the speeches.\""
 sc.422.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Researchers invent theories. I install them incorrectly until they become useful.\""
 sc.423.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Soldiers claim territory with courage. I claim it with paperwork and anchors.\""
 sc.424.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"If this is the final frontier, why are there so many forms?\""
 sc.425.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Boldly going is easier when someone else checks the fuel lines.\""
 sc.426.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The empire expands one confident mistake at a time.\""
 sc.427.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Our legacy will be written among the stars, and probably billed monthly.\""
 sc.428.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I am honored to serve. I am less honored by the schedule.\""
 sc.429.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Today's construction forecast: metal, vacuum, mild resentment.\""
 sc.430.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Some ships chase glory. I chase stable orbit.\""
 sc.431.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The galaxy will remember us. Or at least trip over our legacy.\""
 sc.432.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Nothing unites a people like shared infrastructure and mild confusion.\""
 sc.433.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I am not a poet, but I know a lonely asteroid when I see one.\""
 sc.434.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"If the station creaks, remember that space is quiet enough to make everything dramatic.\""
 sc.435.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I once asked an asteroid its age. It gave me a look that said 'rude.'\""
 sc.436.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The crew has forbidden me from naming another drone 'Little Emperor.'\""
 sc.437.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The void whispered something today. It may have been the ventilation system.\""
 sc.438.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I do not believe in ghosts, but I do believe in poorly documented wiring.\""
 sc.439.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"A meteor shower is beautiful when it is not on the schedule.\""
 sc.440.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I am developing a theory that every empire is three emergencies in a uniform.\""
 sc.441.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The next person who says 'just bolt it on' gets launched into a seminar.\""
 sc.442.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I have no mouth, yet I must request more alloys.\""
 sc.443.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"There is elegance in engineering and comedy in procurement.\""
 sc.444.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I tried optimism once. It required too much follow-up.\""
 sc.445.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The universe is expanding. So is my workload. Coincidence? No.\""
 sc.446.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I have detected a rare mineral deposit: hope. Very unstable.\""
 sc.447.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I admire the confidence of whoever called this area 'secure.'\""
 sc.448.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Some days you shape the galaxy. Some days the galaxy shapes your patience.\""
 sc.449.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I want it recorded that I remained professional while being given nonsense.\""
 sc.450.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The crew keeps asking for music. I suggested the sound of efficient welding.\""
 sc.451.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I am one unexpected order away from becoming folklore.\""
 sc.452.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"This system is quiet. Too quiet. Conveniently quiet. Suspiciously invoice-ready.\""
 sc.453.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I would like to be promoted to 'ship that is occasionally left alone.'\""
 sc.454.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Captain, I have located a new frontier: my patience.\""
 sc.455.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Captain, the asteroid field is dense, hostile, and frankly a little theatrical.\""
 sc.456.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Captain, if this outpost becomes strategically vital, I expect emotional royalties.\""
 sc.457.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Captain, please inform command that 'minor adjustments' is not a real unit of measurement.\""
 sc.458.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Captain, I have discovered a new mineral: disappointment. It forms near deadlines.\""
 sc.459.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I once visited a station everyone said would stand for centuries. Then someone important wanted a redesign.\""
 sc.460.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Captain, I have looked into the abyss. It asked about our warranty.\""
 sc.461.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Captain, there is beauty in the stars and crumbs in the command chair.\""
 sc.462.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Captain, one of the crew has started a newsletter. I fear success.\""
 sc.463.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Captain, I do not want to sound dramatic, but the wrench drawer has politics now.\""
 sc.464.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"If we keep expanding, eventually the map will just be us with decorative enemies.\""
 sc.465.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I respect ambition. I also recommend reading the safety appendix.\""
 sc.466.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The empire wants resources, the stars want silence, and I want clearer instructions.\""
 sc.467.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I have noticed that 'temporary' often means 'until everyone forgets who approved it.'\""
 sc.468.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"That was not the strangest thing I remember helping with. That should concern you.\""
 sc.469.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"One day this outpost may become legendary. Today it needs bolts.\""
 sc.470.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"We are writing destiny in steel, cable, and questionable scheduling.\""
 sc.471.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I hope future generations appreciate our infrastructure. Current generations mostly complain about access corridors.\""
 sc.472.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"A perfect weld is invisible. Much like my praise.\""
 sc.473.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The crew says I need a hobby. I told them this is my hobby. They looked sad.\""
 sc.474.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I have begun giving the asteroids nicknames. Command cannot stop me from bonding.\""
 sc.475.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The universe is mysterious, but have you seen supply requisitions? Truly unknowable.\""
 sc.476.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"If command wanted silence, they should not have installed a communications array.\""
 sc.477.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I know I joke, but I do enjoy the work. Please never quote me on that.\""
 sc.478.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Another day, another heroic contribution to galactic clutter.\""
 sc.479.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I suspect our empire's grand strategy was written on a napkin during lunch.\""
 sc.480.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The stars are cold, but at least they do not schedule meetings.\""
 sc.481.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I have learned that every glorious expansion begins with someone asking where the spare cables went.\""
 sc.482.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Captain, if we meet aliens here, please tell them the mess was like this when we arrived.\""
 sc.483.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Captain, today's weird noise was not me. Probably. Mostly.\""
 sc.484.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Captain, I have identified a morale problem: everyone is awake.\""
 sc.485.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Captain, our current location has excellent isolation and terrible food options.\""
 sc.486.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I once saw a station core more stable than several recent policy decisions.\""
 sc.487.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Captain, I am beginning to suspect the galaxy respects confidence more than planning.\""
 sc.488.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Captain, someone labeled the emergency kit 'vibes.' We are investigating.\""
 sc.489.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Captain, the crew has requested a mascot. I nominated the least suspicious asteroid.\""
 sc.490.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Captain, I have seen the edge of civilization. It needs maintenance.\""
 sc.491.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Captain, remind me why we do not just ask the rocks nicely?\""
 sc.492.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I once heard a star sing. Turns out it was a coolant pump, but still.\""
 sc.493.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I remember one work site with everything: radiation, dust, existential dread, and no parking.\""
 sc.494.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"A good outpost says, 'we are here.' A great outpost says, 'we brought forms.'\""
 sc.495.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I once helped secure a foundation. Its emotional foundation was none of my business.\""
 sc.496.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I have a five-year plan. It involves surviving all five years.\""
 sc.497.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"There are two kinds of systems: developed systems and systems giving me side-eye.\""
 sc.498.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I asked the crew what they wanted from life. Someone said 'better chairs.' Profound.\""
 sc.499.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"My sensors can detect radiation, gravity, and the exact moment command overcommits.\""
 sc.500.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The galaxy is full of wonder. We are here to monetize the wonder responsibly.\""
 sc.501.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Every empire dreams of greatness. Every construction ship dreams of labeled cables.\""
 sc.502.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I would like future archaeologists to know we tried our best and guessed the rest.\""
 sc.503.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"A station is never truly finished. Eventually it just becomes somebody else's meeting.\""
 sc.504.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I am beginning to think 'frontier spirit' means 'no nearby repair depot.'\""
 sc.505.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"If a starbase could sigh, this design would make it practice.\""
 sc.506.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"The last asteroid I scanned had better work-life balance than I do.\""
 sc.507.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"We have brought order to chaos, which chaos will probably appeal.\""
 sc.508.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"This is exactly the kind of place where someone says 'what could go wrong?' and then documentation happens.\""
 sc.509.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"I have updated the mission log: still employed, still suspicious.\""
 sc.510.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Captain, there is a strange beauty in repetitive labor. I am sure someone comfortable said that.\""
 sc.511.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Captain, the crew wants to know whether sarcasm counts as renewable energy.\""
 sc.512.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Captain, if sarcasm powered engines, we would cross the galaxy by lunch.\""
 sc.513.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Captain, I found an old note in the ductwork. It just says 'run.' I assume it means diagnostics.\""
 sc.514.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Captain, I believe the asteroid field is forming opinions.\""
 sc.515.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Captain, one of the lights keeps flickering in Morse code. It says 'lunch.'\""
 sc.516.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Captain, I do not mean to alarm you, but the blueprint has confidence.\""
 sc.517.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Captain, permission to describe one of my memories as ambitious nonsense?\""
 sc.518.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Captain, I have been professional for nearly six minutes. New record.\""
 sc.519.desc:0 "§H§Y[sc_companion_ship.GetName]§!§!\n\n\"Captain, our expansion policy appears to be 'more.' Very nuanced.\""
